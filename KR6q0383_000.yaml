body:
  text: 紫柏尊者別集序金壇刻紫柏尊者全集已行藂林此外有錢啓忠集鈔四卷陸符心要四卷按指禪師携吳江周氏藏本乃尊者中年之作白衣弟子繆仲淳周季華周子介執侍左右手自繕寫者余為會萃諸本取全集所未載者排為四卷名為紫柏別集而序其後曰禪門五燈自有宋南渡已後石門妙喜至高峯斷崖中峰為一盛由元以迄明初元叟寂照笑隱至楚石蒲菴季潭為再盛二百年來傳燈寂蔑尊者挺生東吳氣宇如王蹴踏天下機緣悶現從地湧出實有關於國運隆替法運廢興未可以凡心世智妄為此量也尊者出世萬曆中正國家日中豫泰之候貂寺氈裘孽牙盤互師以慈願戒力住王舍城而為説法溥聖母之慈雲開賢主之智日庶幾礦稅可罷黨禁可除戎索可清殺運可挽群小張羅鉤黨推刃妖書師於是幻有之軀息清流之禍法幢既倒國論日非乾綱下移帝心解紐魔外交侵人天不佑考妖書本末之記知劫運摧剝之因雖業繫有因然實振古所未覩也古來元臣命世必曰降神矧乎法王導師寧非間出尊者秉金剛心具那延力舉手可以拍須彌噓氣可以吸溟渤金翅鼓搏則龍子隨其唼食而況於魚鰍與師子哮吼則香象為之失糞而況於野干與人之云亡法燈熄矣魚鰍翔舞而野干號呼矣同時大德捨赭還緇却來人間以夢遊了大事譬如老將全師退守深溝固壘使賊人相戒莫敢犯而廓清摧陷固非其所有事矣嗚呼尊者之出世其關係國運法運如此悠悠斯世惟憨山老人為能知而言之而其為塔銘茹茶噉蠟含嚼齒舌間所謂我聞有命不敢以告人者也尊者之化去也次年為萬曆乙巳余夢至高山有大和尚危坐巖端謂是達觀尊者恭敬禮足已指左方地命余坐密語付囑戒以勿忘涕淚悲泣而窹距今將六十年矣私心擬議願踵憨老之後撰第二用以續僧史徵國史發揮塔銘未盡光明日月逾邁氛祲晦蒙六十年來一往是昔夢中涕淚悲泣世界吮毫閣筆多歷年所非敢食言於二老也每自循省往昔年少書生不通佛法不知以何等因緣夢中得受記莂今頭童筆禿無所成就尋行數墨排次遺文如拾字老比丘背破籠簡故紙波波劫劫以為能事尊者常寂光中得無自笑失却一雙眼乎別集既成謹書其後以自懺抑或以有待焉尊者之文一言半偈稱性流出如水銀撒地顆顆皆圓余不敢輕為揀別然集中散落者不少如乙未送憨老渡嶺作逐客説及顧仲恭所見淡居鎧公本論卓吾誠所諸篇皆法門眼目也斗間紫氣久而不沒殆斯文之祥乎余雖耄矣猶願得而見之歲在庚子十一月長至後七日來復之日虞山白衣私淑弟子蒙叟錢謙益焚香肅拜謹序紫柏尊者別集目次卷第一序雜文卷第二贊偈詩偈詩卷第三書問卷第四語録附録跋紫柏尊者別集目次終
