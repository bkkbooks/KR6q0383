body:
  text: 虞山白衣私淑弟子蒙叟錢謙益纂閲徑山寂照六世孫傳臨濟宗契穎壽梓贊偈詩比丘觀音像贊四首為南海諸禪上人作昔雲門老漢大似眼底無人見瞿曇少逞英雄便教一棒打殺貴圖天下太平邇當像季魔眷尤隆有一等揑怪衆生不安本分竊取正法如來之號詐現比丘之容乳庭時逢酷暑乞食疲勞那討間氣力效雲門鈍置家風總將來貶向碧波洋裏風吹浪打百千萬劫受苦無窮天下本無事庸人乃自擾菩薩強出頭衲僧笑不了示現種種相寧不愈顛倒乾坤風月宇宙春光既同血氣孰不完妙更何必圓顱方服托形海島咦惹人描摸非佳事惱亂衆生卒未休海門風浪惡誰敢泛慈舟惟有觀世音此中賣饅頭來去紛紛者相逢飽也不飽不飽即置且要檢點因緣明白但聞觀音買糊餅不聞觀音賣饅頭糊餅饅頭是同是別衲僧門下不用指東話西直教當行者辨看若揀辨得出補怛山穿衣喫飯若揀辨不出洛迦山中穿衣喫飯本是一海水情見各不同天人謂琉璃餓鬼謂火膿我今所見者碧水涵虗空一是兩必非兩是一不通往返細推尋此理終未融以故謁大士笑指紫竹叢白花去不遠紫竹吟海風俄然一比丘彈舌授降龍觀音大士讚衆生苦痛呼菩薩衆難交併聲不已不已之心果苦痛如鐘受擊聲何出若人了知知不痛一切荼毒頓解脫海山出雲本無盡海水為濤寧有窮菩薩憫此煩惱雲亦復復慨生死浪忽然示此苾芻身壞衣趺坐苔石上若聞若見俱入流聲塵未必為眼障阿誰携入五峰中早晚經行間拄杖觀世音菩薩讚稽首淨聖尊觀音不觀色頓入三摩中茲晨成正覺恆不昧初心願輪運悲智譬如寶月明水澄淺深現我痛産末法根鈍若牛馬仰熏圓通香轉臭成妙馥感恩雖有心報德愧無力菩薩道今成哀誠獻贊耳又贊我聞菩薩言凡諸有難者號痛稱其名所苦即自在稱者果有痛悲聲復何出聲出本沖曠譬如雷震空空若有形質擊木則無響若以法眼觀大地塵非得況復虗空痛空痛安可一一則無能所今據理不然以故痛不痛衆生迷痛因淫火起莫救玄津焚益枯觀音痛憫我故我恆瞻仰觀世音贊音可以觀色可以聽二根如是餘則皆然是以菩薩六塵圓通六根互用分身則如月在天無心而影臨萬水寂滅則如春在花非巧而艷遍群芳如此大用無擇凡聖誰不圓滿但菩薩聞聲遺聲謂之觀音音屬於觀則不逐聲塵而奔境所以常光時時現前如夜光之珠宛轉盤中超然無滯也菩薩心光之珠以六塵為盤曾無纖滯所以妙而常靈衆生此光非缺以聞聲見色之間生心著想所以珠滯於盤不能宛轉圓活也噫有志男子覩斯言而無所悟發則牛馬不如也觀西方像贊宿有善根佛冥加故凡穢垢身心具淨土勿縱懈怠當生精進誓生彼國了不去去觀佛贊稽首無上圓滿覺神光隱顯憎愛中巍巍妙相廢稱謂一念不生始真覩彌勒佛贊心上若有一毫事安能得入歡喜地終朝坦腹笑欣欣一切見者生福慧頌善雲堂彌勒像從教煩惱等山高一覩慈顏意自消無限春風吹大地那來霜雪上頭毛石佛頌大地一尊佛石在恁麼處大地一塊石佛在恁麼處師子獨行時哮吼百獸死如是大慈悲分明竹篦子疏通一切法法法廣長舌舌上湧樓臺眼前即不見不見我是誰毗盧家舍弟開元石佛贊稽首如來相非金亦非木趺坐驚濤中渡海達於此若謂石有心有心則非石若謂石無心無心豈名佛吾聞自無法攝一切法盡若人於石佛諦信不生疑不疑惑自斷惑所凡聖情層氷覓火焰況夫石與佛何從生二見二見既不生石佛迅於電雪山大士并文殊普賢贊天晴日出雨下地濕飢來欲食渴來欲飲雖至愚之人不待言説而皆了然者即此了然文殊得之徹見自心普賢得之圓用自心惟釋迦老漢百無一事終日頽然憨坐於蒼嵓之下文殊普賢雖復常侍左右提鞋挈瓶種種親近要且摸他鼻孔不著在鼻孔纍纍誰摸著晨朝洗面勿生疑刺血觀音像贊舉心刺血時菩薩已現身譬如濃雲迸寶月忽然露待爾欲著眼雲合光錯過是光樂不有苦難豈可留六根有迷悟苦樂從此起方便拔一根諸塵同解脫一塵粘識精根根皆障礙以是而推之我欲脫苦難必須自疑斷菩薩力無預馬郎婦贊欲火燒靈根心苗終焦滅智者聞此言悲痛入骨髓奈何天下人如花女為寶冀得枕臂眠即死亦甘耳菩薩甚愍之幻此微妙容令衆生見喜因喜生愛心因愛生覺悟覺悟即慚愧遠一切婦人如菩薩無異勿於菩薩身生此不淨想人為萬物靈豬狗乃不若由是淫心生號跳強制止勉然至自然終登無欲地無欲即聖人常為如來子於世作日月破大夜昏暗一人全此德大千蒙利益觀音之化身身身無窮已大士像贊次公寫此像實夫受此像吾亦贊此像未寫未受未贊時圓通自古無比況自是衆生瞥起情日用紛紜淪得喪一尊妙相觀世音鬼臉神頭失本狀當情檢點難何從惡人猛獸皆師友火坑刀山解脫門鴉鳴鵲噪入寂滅或儒或佛或神仙譬如水清月影現臨濟棒德山喝此是觀音廣長舌相遇莫道靜無言楊枝滴水潤焦渴且道誰知冷暖待汝親嘗了來説破未晚墮指觀音贊枯木不盈尺孰運般若手刻此微妙相眉目若山海遠橫而湛然面部宛如月光明照濁世身量及衣紋滿重而縹眇掌垂兜羅綿足襯蓮花浪一念未生處無手手之狀故一指墮時萬象皆墮也摩侯羅伽觀音贊百蟲之中維爾最毒蛇質獸頭聖凡難局長蛇封豕帶之與蝎世皆毒之其毒如髮毒中之雄摩侯羅伽一承記莂為佛爪牙凡有梵剎侵則毒殺聞衆苦聲以眼觀察虬松之下毒處流慈現微妙容見者習移習移識轉智光燦爛駕以大悲度諸毒難兜鍪執斧倚松而間仁而能勇泉石之間稽首大士護念聖觀火焰觀音贊有引凡五金八石觸火能化而況于木惟聖人善能會萬物通乎一己故水不洗水火不燒火耳知此者可與言火觀之微乎稽首贊曰萬物無體唯心為本于斯勿惑近可為遠火兮火兮曷不能水橫計苟化弦解作矢觀音贊以一眼見觀盡世人是億萬心為億萬法法歸於一一歸自然自然歸無有語其細則攝入恆河沙語其大則充滿十法界第一賓度羅跋囉墯闍尊者俱丁雲鵬畫肩高無用聊可倚杖膝亦空間承經何恙莫嫌眉長飄拂巖龕不礙眼光湛如寒潭第二迦諾迦伐蹉尊者抱杖伸指非三唯兩以藏足脫足爽風致疏間巢由之間鬚髮若存鼻孔蚤穿第三迦諾迦跋梨墮闍尊者眉揚目朗揮指蕭然即此為舌法沾人天誰為虎子牙爪鋒利具而不張野干爭避第四蘇頻陀尊者衣不掩胸心同虗空握拳誰擊開口漏風謂手按膝膝無我人謂膝承手手原屬身第五諾矩羅尊者背若果有癢爬難除果然無背𭺗癢非虗往復觀察情枯智訖池成月來眼底見佛第六跋陀羅尊者頭疑怪石飄髮如柳一手持珠以珠代口莫驚濶頷具體而間顛倒佛頭依稀德山第七迦理迦尊者面圓如楪五官併穴分疆割界漂杵流血衆部之君眉應不群坐妨曲折行則拖雲第八伐闍羅弗多尊者衣卸肩出碧眸注經此經甚深大夢雷霆文字非實實非文字獨垂一足兩手自恣第九戒博迦尊者腦後無際額憑高巖手中所握扇塵同函雲沸無心偶遮半面其誰作禮直見不見第十半託迦尊者視經垂頭肩背吞耳泉出地中湛然在紙嶺南老盧柴擔暫停無所住心得之此經第十一羅怙羅尊者怒髮衝冠唯師不然刈茅非鎮一怒盡蠲三屈兩伸卷舒一手嗔為佛事誠不請友第十二那伽犀那尊者兩手支頷恐其墮地口開齒露眼迸心睡心睡身忘石無施剛石忘我足沒入何妨第十三因揭陀尊者腕為杖主手復持珠更恐心放托經自娛秋空鴈鳴梵字參差以此贊佛耆年了知第十四伐那婆斯尊者一心不生我即龕巖波浪衣紋泉鳴翠巉眼雖不開光照六合明暗兩忘見精非雜第十五阿氏多尊者斂肩抱膝果有所思我所思者心精思遺思遺而坐寬窄皆可石本無相吹毛莫躲第十六注茶半托迦尊者枯槎生花非耳不見額鼻俱聳春光何限屈伸有常機絶抑揚三直兩曲臂肱堂堂第十七慶支尊者琉璃為鍊內外洞然目注其中五臺現前白雲舒卷百狀千態故埋松根逞其自在第十八賓頭盧尊者以杖倚額額為杖架一肩孤聳並足酬價杖額不同主賓何功唯肩與足空礚虗空皮毬道人自贊汝這男子出身不是名門舊族情懷大都濶略寬徑世出世間之書見之如飲醇醪而不醒有時胸中覓一箇字腳又不可得佛祖機緣葛藤落索偏解拈弄無常了無繫帶或嫌佛祖無靈置之腦後恣自家一片舌頭貶斥聖凡忽升廁中蛆蟲於毗盧頂上忽斥達磨老漢於下風要人學好如己還過一言不合王侯涕唾我看你一條窮性命東擲西拋著恁麼急咄將此身心奉塵剎是則名為佛冤家其二善知識不曾參得一箇教乘不熟間得一部每向無佛處稱尊忽然撞著鼻孔遼天腳跟點地底漢子直教把住襟喉坐斷舌頭我看你又向甚麼處更施手腳咦相逢謾道無機械圈多端惑亂人自贊這漢行腳三十餘年跋涉山海露宿風䬸峨嵋勞盛白雲補陀時光拋擲所立何事頭毛白而難黑事未了而心悲且道所悲何事甬東三佛地海濶魚龍腥天童與雪竇法鼓元不鳴深心奉塵剎二李眼聞聲四明李次德驥與其兄次公麟參筆經營畫師大像自謂生平寫師此為神似雖爪髮皮肉無不畢肖大師手書贊筆迹雄偉今傳甬東陸符家漢壽亭侯關將軍贊今日之光露於許田射鹿之時許田射鹿之光露於桃園結義之日此光此心又得左傳聞薰擴充躬體力行之效宜乎千古如雷如霆如日如月震諸昏蟄破諸幽暗賢哉壽亭是故贊之宋嶽武穆王像贊將軍耿光萬古無配學射於師師亡如在以斯事君軀命敢愛出處雖殊寸心無再中原失䇿醜巨為憝據我疆場犬羊成隊將軍奮怒一掃腥穢復神州垂成而廢心知檜姦君命無背視死如歸坦然非悔光同日月炳耀大塊匪擇賢愚孰弗仰戴浙西之巔虗受若鼐中有精廬城山是載將軍無辭永為法儡吉者賜福凶者摧碎我乘佛慈敕爾勿退吳江優婆夷周母薛孺人贊漢高大度項羽強悍臨死生別離之際而不脫兒女情狀又青山白雲二三十年精修禪觀者臨終坐脫亦不多得況女流乎孺人生平奉佛勤至尤信往生法門故其臨終之時家業手製兒孫滿前毫無情見超然坐脫即此觀之則孺人過漢高項羽多矣或者以女流閨閣高僧贊之非虗語也噫無雲萬古吳江月淨土蓮開火宅香偈示潯陽二邢偈出王宇泰筆麈紫柏尊者在潯陽邢來慈匡石二居士同聲問曰秦將白起四十萬人一日坑之為是多人坑一一報多人為是多人罪重天使坑耶兩者疑結交搆胸中唯願尊者開解疑情頓剖積垢尊者即説偈曰昔多坑一今一坑多一屈一伸箭鋒相值本無所失無失無疑疑既不有將何開解以是印心天遣非理凡有報復情有理無情如夢中理際非夢夢中一多醒後追思何多何一若離一念古今延促多一之辨醉情昧理不以比量折衷非似亢違聖斷穿鑿橫計非理設問智者不答茲憐若愚強説是偈自今而後莫生此見當於佛前懺洗癡垢福慧冥長脫弗痛悛終成魔外吾語不真吾舌當朽讀東坡夢齋銘偈出王宇泰筆麈東坡居士曰世人之心因塵而有未嘗獨立也塵之生滅無一念住夢覺之間塵塵相授數傳之後失其本矣則以為形神不接豈非因乎人有牧羊而復者因羊而念馬因馬而念車因車而念蓋遂夢曲蓋鼓吹身為王公夫牧羊之與王公亦遠矣想之所因豈足怪乎紫柏老人寓余齋中與余讀夢齋銘而示以偈曰開眼見山河合眼山河見能見既本一所見豈有二雖分夢與覺能所覺夢等如覺乃有待夢或無待者無待則獨立何塵相引授以此觀覺夢開合見非異但習俗橫執謂夢覺真偽如開眼無想合眼夢自除吾本來覺者非覺夢所囿只此不囿光照物初無纍明了若未起覺夢亦無地解此可轉經用此經無字無字轉無歇塵剎熾然説什祖頂鉢偈無心頂鉢鉢無輕重有心分別鉢重不勝由是而觀物我本無分別建立又如茄子誤腳踏碎心疑蝦蟇合眼討命開眼見茄蝦蟇無影汝為佛子常作此想萬法無法心生橫有生死煩惱亦復如是為顯居士乞米偈法輪轉處食輪先甘雨通宵注似泉麥熟莫言非佛力黑山延慶結因緣晴雨無常偈萬佛莊前觀月色月中無雨是真實黑山延慶雨何來遠近普霑皆利益若使雨性晴性常先天弗違聖慚德須知陰晴事隨緣緣熏熟處業用力顯慈息微菴字偈根塵脫落此心頓顯顯則微妙智識難見日用靈然江山踏遍歸來報本見偈始驗示支檀拳手偈衆生無明熾執身招生死聖人愍其愚教以觀一四見四了不昧一身不可得此滌凡夫垢非是二乘執又以一遣四四亦不可得一四俱不有直下無生智不可以數求不可以情會情數兩坐斷肉塊金剛體譬如手作拳或者作拳想或以拳作手或者作手想拳若有拳性作手不可得手若有手性作拳不可得拳手兩無性執者寧非惑雖無拳手性拳手宛然爾我此拳手偈相逢誰薦取自信合佛心龍神謹護持凡願見聞者俱悟無生理婆子拋兒水中臭口才開驀一橈老婆無計雪腥臊便將赤子拋寒浪惹得魚龍四海囂頌德山托鉢托鉢因緣不甚難耳邊密啓即幽關相逢就裏知歸處萬妙千玄片餉間偶偈落花滿地已春深長日空堂演梵音若要靈臺無一物好將四蘊細推心毒鼓頌見身可得生死媒介然有知憎愛本若人兩者了無性境緣順逆塗毒鼓降魔偈若人精進時動靜境界中一切善惡想皆自心變現故得自心者衆魔不能惑如未得心人彼現作自觀除自心之外萬有不可得不可得中若有魔何異層氷覓猛焰如是諦觀自心空心空境寂魔不有魔既不有佛不生佛不生處光充滿此光有緣得覩者順逆關頭恆自在持是自在度含識佛燈終古照無盡一切魔屬當護持此偈若不護持魔種不能活交蘆菴偈萬象皆交蘆了達何好醜渴鹿逐陽焰愈近轉非有瞥起凡聖情夢中生取舍輸與溈山牛水足眠深緑題姑蘇寒山寺壁間寒山拾得像虗空其懷金石其質古之今之對面不識又奇峰難以狀其骨間雲無以喻其心吾不知其誰氏之子奚超曠而精深又洞然劫火燒虗空兩箇頭陀漫作風若問安身在何處可郎鬚上好藏蹤題明月寺虗無萬象本玄遠精神門杜門而拔本進德何所據哀哉無事界墮落難出去死水不藏龍藏龍須活水譬如一枝花春光寧有際此言固雖淡味之頗有理題竹塢石室何處無青山片心灰冷艱片心灰冷易智拔萬重關師拈末句問曇文答曰竹密不妨流水過山高豈礙白雲飛師命文三拜曰先以定動後以智拔汝説不免現成五色糞偈男女念不動赤白則不流赤白既不流我身安可得我若念不動赤白難所主諦觀三緣中身心氷底焰氷底若有焰氷則不名氷智者如是觀深入如三昧百花林下臥弗殊荒冢間欽壇成荒冢遊者誰復留假使有香餌進之不肯食怖畏掣肘去寧敢生盻顧惟有紫柏翁同觀無二見破執偈形骸如皮斗心識若巨燭光焰本無際皮斗不明忽然揭皮斗光即滿天地此據橫計言皮斗燭不同了達橫計空説甚皮斗異五言偈白雲雖無心去住亦有度清風則同行驚飈不隨舞卷舒懶希時惟乃率其故孤峰與高松長空及深塢來往任悠悠那受塵侵侮又承蜩蜩不飛蜩飛我有意蜩正不飛時蜩我本無二有二則情生情生神不凝神凝我物敵彼此各有形有心尚不可有形安可承工在纍丸起其次乃忘形我形若不忘纍丸終不來形忘貴無我無我神始凝此旨頓然曉可以學長生渡江偈示戴生升之夢中見海不敢渡開眼見川不敢涉分明陸障非水障陸障若消海可涉此理現成誰不知不知端為情所結解結之人虗可步山壁由之火不熱善哉男子能悟此去來長江蘆莫折墮生歌君不見溈山水牯牛蹄角異常流苗稼從他茂不犯莫相尤白雲叱郭公立石火電光喻莫及縱使兒童解著鞭聖凡路上難收拾曹溪水雲巖草城市山林恣幽抱相逢若問有何能耕破虗空種梨棗這家風輸與我右即右兮左即左平田淺草總生涯譬水方圓無不可或時上或時下逆順縱橫寧玩把龐公未是就中人當場且握雪團打休妄想皆影響覿面相呈謾鹵莽夢中蹴踏龍象棋一著參差三十杖此綱領豈易逞笑殺捉風并捕影獨許章郎蓄養深搖頭擺尾那堪省那堪省那堪省春來處處泥沒脛一聲短笛月明高不脫蓑衣臥誰肯收芒繩繫枯柳人兮牛兮無煩守斗柄從教夜半移憨眠如醉君知否感懷歌古云蜀道危又云長江險蜀道攀蘿度不難長江無風亦可還惟有人心危險極千奇萬怪不可測論交滿口如蜜甜誰知甜內皆荊棘荊棘刺人人不死心刺刺人死未止忽地思量怕殺人究竟總因情所致情關未破莫論交論交須待情關破情關破了冤親齊寧有相知仍見過示王二峰歌憐君今年四十九燈下相參面目醜昔日容顏今日無韶華過眼能幾有燕山見我不相見慈壽香雲浮片片不見因緣意最深渠儂未必能親薦我本雲外人胸中何所欲去來若轉蓬豈肯墮流俗王二峰王二峰長橋月明清淺中朝三暮四但如此吳江水急鎖垂虹子未生功未建等間雙鬢白上來世故紛紛更難遣一息不來身無主身外所有豈能住固有常光變黑風羽毛鱗甲頻來去天地生我不能育資我生者聖君祿祿無窮而生有涯相逢幾個能回燭呵呵呵會也麼老僧饒舌為誰何來年桃李如今歲紅白枝枝風雨多更有一般堪痛處大頭不是小頭和王二峰余妻父也萬曆己丑進士禮部郎中繆仲淳覆舟鶯脰湖中二峰救起解衣推食遂為生死交後將赴任同仲淳謁大師示之以歌無句不驗二峰功名子嗣之念甚切故開示對病發藥于中甫先生簡老人稿凡類神異者悉不採録余為翁壻此歌得存末小頭似指余內內為翁舜女既無出亦四十九而亡爾周永肩性贊識斷凡禪人復天池贈之以偈并序天池子曰凡可斷乎曰斷凡之情非斷凡之法法若可斷何殊離波求水山外覓雲乎若然者凡情既斷雖鑊湯爐炭淫坊酒肆皆蓮華淨土耳況斷凡禪人高臥層峰與鹿豕遊果有凡可觀乎哉無凡可斷乎哉雖然情根久植非力斷之終難得佛也斷凡禪人復天池其寸心之苦一生九死而乃克功紫柏道人哀其初心聊此贈之雲石可以臥松泉可以弄鳥語恣所聞客去何必送天池龍睡隱庭竹堪栖鳳隔嶺花山鐘當陽蒼土洞斷凡心不生六月煙霞凍此意向誰道搊鼻難忍痛示廣燈法名偈兩度廣燈今已見祖翁何事太留遲箇中別有通霄路鐵壁銀墻自在馳此偈非凡夫心量測識徵或不遠于鑾識贈清原寶藏秀峰二禪人方始悲秋又復春百年豈止過駒塵黑頭若許黃金買不死輸也富貴人住來無著與天親市上安禪道自真少欲何須觀白骨有緣曾不破清貧寒流並汲澆瓜菜古佛同修愍世塵最是一般堪愛處共甘淡泊懶求人牢山訪憨清公吾道沈冥久誰唱齊魯風間來居海上名誤落山東水接田橫島雲連慧炬峰相尋不相見踏遍法身中諸城道中乞食秋風古䇿輕曉揭淺溪清此日風霜色誰家鼓鈸聲疏林明海曙曲徑勘人情白足空回鉢蒼頭聞令行詩送幻居講主之徑山吾久浪山海茲將息影何念爾為前茅且建安樂窩雙徑固迷迥五峰亦嵯峨松濤鳴碧空舌相真奇那登錦屏山日上長歌度彩虹隔江煙火古蠶叢危峰欲墮松根抱浩露初殘花影空山水不殊前代色衣冠猶帶野人風白鷗訝我登臨晚來去飛鳴錦浪中與王圖南出塵出塵地不遠貴在方寸虗憎愛匪關心逆順常自如芳草總心訣白雲皆禪書能將耳檢閲除我誰復儒示范君昭處處青山有白雲此回何處更逢君流泉若使眼根聽始信楞嚴非見聞過姑蘇北峰支公隱處松根抱石不知勞誰向空山守寂寥老我遍參行腳倦笑來此地種靈苗
