body:
  text: 虞山白衣私淑弟子蒙叟錢謙益纂閲徑山寂照六世孫傳臨濟宗契㯋壽梓書問與馮開之共十六首貧道初辱法愛猶不敢承教及請赦文石罪始獲領益下風自是公信此道如釘入木既進不復出雖有奴兒婢子鼓惑侍者使蔽聰明相成頂墮然仗佛之靈見地日清惟綱宗之旨未了綱宗譬諸符璽符璽在我生殺誰奪一失符璽雖王侯亦莫能賞罰人矣今茲黑白孰不看幾則公案尋常自謂明了及被人覿面拶著便如雷瞋相似眉眼雖動愧然無所措置此綱宗不明故也邇來士大夫中知好惡者實難其人即僧輩亦不多得惟公大憤精神參究諦當做箇雙眼圓明的護法菩薩貧道初未敢以此望公自公於此道微有信入實望公不淺然猶以公世故重而道念輕恐中心柱子不甚牢固又君子親而不能久小人知而不能遠不能久終必我遠矣不能遠終必我親矣君子遠而小人親恐外面夾持又無其人公如肯慰貧道之望須無忘貧道之言又別來甚久南北殊絶了無音寄何世道凉薄如此大都比時無論俗人與僧惟以機智為能窺動靜而迎人意就情辦事則真實根本竟無暇培護由是觀之法門興替可知矣豈惟道法若是世道亦可知也貧道受質儻直不能希世浮沉惟深雲是避不知先生近來作何狀常想先生亦儻直恐于世路亦難苟措近得仲淳中甫書甚喜聞先生終日超然不以官故纍大慰遠人貧道度夏清凉山中讀黃山谷全集偶及山谷謫官時作承天塔記有權貴欲托名不朽而山谷竟閣筆勿應于是其人憾甚譖山谷于執政者大受誣逐貧道不覺汗墮如雨且慟弗能止若山谷當時心地不真安能使後世人痛腸如此因想先生當時此真實如金剛山一任毗嵐橫吹竪撼當有時放大光明在此貧道銘刻肝肺望于先生者也密藏應世才能今非昔時比矣可喜可怪即日往峨嵋會晤未期惟為法珍謹又大都男子出處實係前分世之嘈雜讚𠷣何足介懷且榮辱無常兩無自性辱若有性貧賤者斷不能及富貴矣是以達人了此安于榮辱之間不見二致此旨先生素洞明者不知觸境真受用自在否若不自在佛法即無靈驗法本有靈驗先生受用不來便是魔鬼入家矣大丈夫氣宇如王魔鬼在家而不能逐出可不耻哉不遠數千里獻此言先生休負我於岑二公時亦相晤否晤則為致之白髮種種也須精進又別先生來即登牛山結冬訖觀不可久居聞妙峰掛搭京師遂訪之故得與藏公仲淳晤接大都刻經萌兆天時人事頗宜中甫疏放有執見地微清但未大透終不作住頭許可徐孺東鄒南臯并曾健齊皆宇宙中正氣惟健齊于此中有深信南臯拗強可取貧道去住類孤雲安著踪跡特適志自任亦嘗念先生懷抱真率資質粹美海內幾人哉然貧道猶有蓬心不滿先生者以先生耳根太硬硬極則變硬之變不軟而何且先生喜聞耳硬或者不允又加之軟譏則先生之不快每每浮之顏色如聞貧道萬里直音即能轉習則法門有賴多矣又紫柏道人峨嵋東來初意本欲挂搭天目徑山者以時歲勿嘉故權寓曲阿耳然天目徑山悠悠在念焉即陽羡水山亦自清勝又為請謁者多似亦致擾白雲也鄙人書經拔親為答劬勞此心耿耿二十餘年矣比欲完之是以不暇接人如舊疏狂之習似亦消去大半惟不近人情故復未化習僻之入骨為靈君損妙若是乎譬猶一婦人貪欲者見之生愛同色者見之生憎作不淨觀者惟見清淤無預之人見之平常兄見之妹子見之母此則惟聖人能之且夫妙明覺明初非兩件四者見之無非覺明兩者見之無非妙明此等淡話少有知見之流于明了中率皆能領略惟任運不昧其光雖大方菩薩猶難耳即紫柏道人不近人情亦妙明之妒先生何以教我又峨嵋顛末切須他書再細考之茲山乃華梵標幟一字一句苟非清淨靈臺頓忘身心從虗空中生大靈響安能光飲魔外揭人本心耶惟願弗苟惟願弗苟可道人痛乞又比讀聽雨草則居士時義較昔掇高科之作愈精愈雅矣又如諸葛武侯節制之兵嚴而安徐而疾誠佳藝也雖然流芳不待年命幾何哉足下往者相見時未及四十歲頭毛蒼然此乃用心時義所致也大都文章秀雅即精血所化是以文章愈奇而精血愈枯焉吾意願先生于出世法中拚片精神打磨一番苟心光洞徹于內典肯綮并古德機緣蕩然無礙而飯粥之餘或現量所得內典中精義自心光𦦨留照千古不亦可乎即古人葛藤亦頌幾則亦如楊大年張無盡輝映禪苑力持大法豈不至上且世間眷屬因緣不知縛了多少漢子入于地獄雖則世諦也要周旋然眼花認著甘墮己靈有智丈夫宜作去就于精神尚可收拾若形衰精敗斷不能了結由是言之則時義不做亦可即阿郎并相知中求教者稱心現量打發足矣何必苦心自作昔李伯時畫馬秀鐵面呵之以為必入馬腹而墮地獄今之留心時義者心術循良一旦出身做好官則亦有益如心術不佳藉此出身為大盜而劫人則較李伯時而先生罪尤甚寉林風便附此又長郎成人矣已了世中一節大公案又纍輕一層可喜大抵纍輕則力大纍重則力微矣故地承一切又不若水力水力又不若火力火力又不若風力蓋地以四塵成水以三塵至風則一塵耳惟心無一塵力不可思議由此推之纍輕一分則與真心相應一分而力大一分奚惑哉吾在北時辱惠書曰般若緣深天去其疾非先生孰能于此比相知中俱言先生兒女情多風雲思少若果然者則貧道青山白雲誰壯寂寥乎四明李次公乃烟霞徒耳其于內典頗曾探索且操守勿苟今其省父南來道出鳳城指渠一謁高明當以門裡人接引之又此道荒凉東南已知舍先生其誰哉然一別五易寒暑幸暫披晤遂復離析人非木石安能恝然無情初意登徑山自謂過杭決有十日之談稍洗積渴不意平望橋頭覿面錯過貧道法華楞嚴藉佛寵慈俱已書完裝潢秀茂皆屬丁南羽一手裁製故得如意也先四僧護行矣此經安置西山寧化蘆芽峰頂鐵塔之內所願併塔堅固候慈氏下生放大光明炳燭法界四衆問佛佛說所因釋迦教中初末世有一比丘名真可書此二經一名妙法蓮華一名大佛頂首楞嚴為報父母生育之恩今放光明願見者聞者共生孝心因孝得佛是彼願故乃放此光時彌勒語訖四衆人等皆生希有想亦發願如我想先生必喜聞者及此閏三月十六日金壇諸弟子送至瓜州而別截江風致天色空朗青山兩岸碧水中流片帆如葉頃即到岸吾願先生同截苦海登彼岸等山西路亦不遠且近清涼若得杖屨一行何勝如之于中甫真先生的骨時常切要煆其知見不可情識楞嚴曙天血書華嚴乞先生作記用垂不朽毋忽又清風涇闞禪師銘未就使此老幽光至德無壽于世老漢甚慨之妙常庵主妙峰雖石已具銘未求不幸而死矣故老漢新托寉林代完此公案當欣然握管速撰之則老漢受賜多矣寉林到清凉辱手書何慰如之久不晤公公之近來習染甚矣奇男子家眼睛無珠腰間無鐵可乎願痛思之老漢拄杖實無面目當機之際狹路難避莫道不言又道人持鉢諸方三十六年矣始行腳時絶勿曉世情利害在前初不入胸且不知渠是何物故日用超放快活處有餘自行腳久歷境緣逆順種種變怪駕無為有化有為無理道捺過率橫以私情惟快業識不顧將來結何果子此輩出之法門外猶不足駭出之法門寧不恐怖古人每云生平無限傷心事不向空門何處銷大都世中不可意事譬如火空王三昧譬如水以水救火吾如來深慈也今此輩直以水中生火焚燒善類使玉石不分是等情狀於吉祥靜海雖辱惠顧竟不一言者恐波及先生耳茲復提起非但貧道要十分護念在先生亦當十分痛密則將來受患猶輕不然臨時悔之晚矣又諸郎尚未知經遠之計朋友交接苟非懼天理識因果者斷不可輕容相處若于此為父者不能以深慈妙嚴使子女輩隨量成器則莫若不生生而復怕費心調獲則不仁甚矣惟願不以深慈刺情不快即于不快時痛猛悲泣一上則道人承惠多矣蓋先生擔子漸重海內金湯寥寥臺老又老唐一所董玄宰輩得一紗帽蓋頭惟快情恣識逞其素所不逞寧暇及此趙定老近有信占宇泰中甫當委曲時警䇿之道人結夏皖山三祖寺之馬祖庵彼中山水奇曠天目當兄之但不得與先生共耳又禪有邪正官有冷熱邪禪熾行則正禪受厄矣即如熱官焰高則冷官焰低矣嗟乎邪邪正正冷冷熱熱千態萬狀陋不可言阿奉者易進諤諤者請退如此種種試觀一心不生之前何殊片雪撲紅爐哉故曰達本忘情知心體合若然者則邪正冷熱皆情也非本也如不能達本因循恣情情勝則本敗而無所不至矣又豈能知心體合耶先生官不甚熱忙不暇如此乎道人抱病潯陽百餘日病稍愈即勞盛獄起帶病冒暑北行上諸公書訖復乘流南還挂搭石頭未幾則公亦至公至將半月不能遣一蒼頭一問道人病則先生冷官作熱官夢煩奚暇夢雲外病僧哉吾非情求公直以理警耳又潯陽水山高勝非他者可並蓋皤湖盆其前岷山帶其後波光空翠交映之中而漢陽諸峰裝憨作癡爭奇吐秀萬態非一如使嗜欲深而天機淺者能一登之則直下亦未必勿習染𪹼落靈府廓然況天機深者乎貧道抱疾長松之下幾百餘日而寒熱交攻之際藥石逆治之時常識駭飛本明忽露所謂波光空翠者亦首尾騰換耳吾知真實居士堪與語此乃不敢諱而暴之意欲居士擕一健僕挾一枝枯藤駕輕舟順流而南直使病僧得請益維摩亦得廬嶽發前人未發之祕也如王程有限為人臣者悚息勿敢遑寧則山水之興又當次之矣然居士此出大非細事惟君子小人之辨勢涉危疑斷不可依回放過貧道于久病中握管作字不遠寄公公切當大知好惡始得曾健齊公之相知一病不起何痛如之幸得中甫治其後事足見法脉不無人也時在嚴寒動定加餐慰我幸甚特遣覺休不遠而來切為法門之故惟先生痛體之餘無說又古人讀書便立志作聖賢今人只要作官吾曹亦然古人出家志在作佛祖今者惟為利欲耳貧道遲回長安念頭頗不同然舊識皆勸我早離北雖是好心為我實未知我大都為我者率以利害規我若利害我照之久矣實非我志也我志在利害中橫衝直撞一兩番果幸熟肉不臭徐再撐立奚晚先生受性真實故直以此相告即先生官到此世味亦只如此倘不以本分為急務計亦左矣先生年漸高矣酒色怒此三事乃貧道數干里貢先生之供養也往于石頭舉動逆思之而有悟亦人天師耳徑山化城宜委曲復為完藏道場母誤又南中自臺老即世之後金湯大法非先生其誰乎然先生心真而才智疏終非金湯料也大概金湯之料非雄深堅猛者卒難為之雖然南中若微先生又更難其人矣先生才智雖疏而真實有餘故也然則南中佛事貧道不委先生獲持又委誰乎比徑山楞嚴密藏養病未還幻豫化不復返雖能勤興勤充使小隙亦不過全開郎與本郎之舊貫此二僧豈能復振其頺波乎要在先生與諸金湯法侶聚謀定其人則徑山楞嚴兩道場事一一完之不難也願先生熟慮之貧道年在耳順有順之名無順之實豈果能備僧數耶然微貧道亦恐如貧道者又不多得願公等恕其短而頷其長或可以有少商略也外肥皂兩九附洗染垢願勿却解蕩人天業能除凡聖情不知誰敢用垢淨任縱橫又萬曆三十年十一月初七日始得展手示徐讀之備悉先生并江南法侶深護智願之心即土木偶人亦必知感況貧道耶苐先生與諸法侶深護之心固美然皆不遑裂利害而計之經稱丈夫畏時則非人得其便非人即邪神小鬼耶大都邪神小鬼得為祟者不過我有欲我若無欲則彼伎倆窮矣所謂欲者粗則不過名聞利養聲色近則不過肉塊子與能計度分別人我之心若粗與近者直以無塵智強力觀之則雖不能頓融必不敢公然與能觀察者抗也且百凡利害必關過現之業故憂虞之與悔吝悔吝之與吉凶於不覺不知之中莫之然而然而任運計度生焉此三者生而不以理折情則憂虞之機不從吝不從凶將何從耶願先生無忽勇猛思之思之果有霍解則知杭之天目江右之匡廬不在杭與江右即在長安也貧道未出家時智勇不在人下凡世間之計度無不計度過者以千計度萬計度莫若出家為僧是最上計度然後脫白一條編四十餘寒暑稍弗住腳寧有如此人又畏時計度利害而取舍之乎又吾曹斷髮如斷頭也更有何頭可斷哉然先生并諸法侶深護智願敢不知好惡但我斷行止要心常不與世心和合為精進故曰尋常利害稍關心臨終自然生死現貧道近年操守較往愈甚矣不委先生邇來于逆順關頭果能得自受用三昧否此貧道切望于先生者也此真語也辱先生特遣興肇持手示召貧道如不以直心答先生與諸法侶此非佛弟子本色客歲沈訒卿看馮琢菴脈後謂貧道曰琢老若不速回去則應酬不減靜機無繇恐入春大命難保今年琢菴果死噫琢菴死而先生頑然不驚且痛則先生死機亦不遠矣自密藏去後貧道與先生疏濶以來先生得聞藥石之言罕矣茲先生又得貧道吐此裂情網之語此先生自致之非貧道橫加之也再願先生熟思之想天氣漸暖遊湖情高水淺舟輕黑風謹慎癸卯三月初七日大師集中與開之先生書僅二通及得其家藏手札凡裂情吐膽塗毒而出者纍紙皆是也因思大師手書與人其不顧忌諱中人隱痛如與先生諸札不得盡見集中此段血心歸之滅沒而不可著者誠不少矣然余考大師蒙難挺身抗救止于中甫一疏事雖無及猶足為宗風吐氣至發憤流歎欲哭欲泣託于詩歌而見諸文辭則反得于師明德而友達觀之湯義仍若夫聞難旁皇及承訃痛哭嘔心一文以抒寫平生發揮其末後之光焰當首屬之先生乃寂寥無聞僅于日録中記師坐脫為一發慨因歎息小道人性田不可及則亦可謂負却阿師也師以萬曆癸卯臘月滅度是歲與先生書尤加痛切甚以死機不遠折其遊湖高情乃大師既逝先生亦不久旋歾若夙照而預讖者余故于二十八札録其十有六而于癸卯一書獨存其日月陸符法仞識與馮開之札長江之南地若片掌而片掌之間久缺聞問可歎也先生近從赤水遊赤水仙學自謂扶宅非難且其氣盛於先生先生何以轉之若不能轉渠即受渠轉此皆水火之力力盛者則奪之矣若不受渠轉是須旗鼓相當於人天衆中一較雌雄寧無明眼者為之證據哉宋山谷黃先生凡遇道之邪正關頭必正色而諭之決不用偷心取一時人快也故其耿光與諸禪爭先宜其如此今人稍涉勢利津徑則利害是顧榮辱是僻偷安是樂三是障心雖力如巨靈孰能撼之此等光景歷歷貧道親嘗者也苟無道以治心觸此境界安得超然哉吾眼中之人唯先生受其擠陷雖復乍聞亦有動心時少頃則忘之矣此最入道捷徑峨嵋別傳老師行實乞為大整斥之不惟此師籍為不朽吾亦欲先生之名同普賢老人不朽願無忽又栖霞兀齊法師并其弟幻齊法師行實亦乞先生文之此二師于貧道有法義交渠先行而后行者不為之圖不朽非義也又華嚴新論聞是宋板字畫清整朝夕思得朗讀百過少慰渴懷也不知此味何日上舌禪人覺之其天資儘可教者但恨其常習入骨卒難淘瀉渠自發肯心則瀉之亦勿難者又其性近于文如先生𢬵一月之工開其文竅闢其文路壯其文氣堅其文骨提其文心保渠必有成者又居士官套習生猿猱習熟每寄吾書則以為疾今官漸大得非疾大乎若謂南官冷靜可以久祿此非自食其言乎是事平言世中人誰肯及此思之傳金沙十方院疏文先當說理透徹方好敘事以東魯書生有理法障故又先生于楞嚴靜室曾稱丁勺原奇偉殊倫可為法門金湯苐于法海中迥未有所入乞師特接引之語訖即為貧道扣三首以是貧道過滁陽誘拔之渠世味正濃雖復相見於出世法掉頭不顧比勺原蒙大難頓覺交情反覆波瀾莫喻始知好因緣處翻成惡因緣貧道望其眉宇愀然頗有厭世之色即為提明向日先生婆心扣首為渠之事渠始痛感先生為渠熱腸先生急當作書力提出世因緣渠亦得力信入且渠雖離此大辱而精神胸次不惟勿困頓實超朗無介亦可敬也又承手諭教我甚深苐徐思之斷髮如斷頭倘再計山林可以避禍朝市取禍必易則尚有頭可斷矣所以甘受報緣初不暇生心趨避也且舍境何以煅心哉又令夫人信心何如世中之苦唯女身最苦何故行止多障礙故然要脫苦亦不難但能以堅濕暖動四大行住坐臥細細觀察查審何大是女身若查審有個頭腦便悟男身惟名言況女身乎先生勿海漲宜正顏色振精神將貧道法語痛示令夫人蓋貧道往嘗受其供養今不可不提撕之此理也非情也寄開之大郎二郎百丈竿頭蹈丈木而驚悸大地之上履寸板而坦然此何故哉蓋竿本不虗地本不實嗚呼一切衆生于無實無虗之中橫計虗實故也句到意不到剪花能引蝶蝶醒呼不來意到句不到蜜在瓶中藏遊蜂寧聞香句意俱到譬如春在花枝誰矚不思句意俱不到殘紅逐流水春色浪頭尋示王宇泰居士念頭未起靈然清淨本無我人此其所以一切病患奈何他不得豈惟病患奈何他不得縱十方諸佛盡其神力亦摸索他鼻孔不著念頭既起即有人我能所成敵觸處愛憎愛憎既熾則綿然交戰于胸中瞬息無停頭頭物物莫不見障如此等人豈特病患中受大劇苦就無病患時節被他愛憎使得慌慌忙忙一點做不得主何況正在病時攢心徹骨之痛呻吟苦楚情識種種又安做得主雖然此就常人言之耳若智者分上必有個消遣處若無消遣處臨一切病患便作不得主不免隨他種種楚痛去也且道如何是消遣的法子我今且問能知痛者畢竟是何物所痛者又是何物若無所痛知痛者不有若無知痛者則所痛于我有何交涉大丈夫到這時節正好作觀想畢竟尋究能痛所痛是一是二一則能所尚無阿誰受痛二則能是能所是所能痛畢竟不是所痛能痛若是所痛又則是一一則本無能所受痛者阿誰公於此直將痛苦中種種憎愛憎愛情識轉為一個觀想𢬵命挨將去畢竟要知痛者是誰為祟果然推得入頭不惟業消痛除敢保參禪一節從此結案所以古人病患中發明心地者不少故昔人見病患不來慚懼悲泣竊痛責己此必諸佛捨我不冥加我故若肯冥加則病患不離何以故蓋衆生從無量劫來迷却本明廣大靈然之體活潑清淨之心執此浮想及這臭軀殼子保惜不捨若是病患苦痛煎迫衆生自然悟此身危脆臭穢不淨有此念頭起時更得善友傍敲暗擊此身臭穢不堪保惜此相不實又何憎愛病者果是個英靈種草聞此言句不唯這些病苦不顧直饒飛矢刺目拔刀撼胸但恨觀想不純熟向上不明徹豈有間工夫在臭軀殼上作活計耶道理即如天有警人君之慈則垂象現彗今日宇泰剛發心究此大事便有此病苦來魔此實諸佛冥加在公不可不省貧道見公有此病患既為公憂又為公喜答仇謙謙語三段喜怒哀樂之未發謂之中此中既云未發誰知其中夫發則有知覺可知中與未中未發則無念無念則無知覺尋常所謂未發之中者將何以見其中若以已發未發所以知其中者則已發不即未發未發不即已發則不可以已發未發矣此中儒門大本不清楚久矣惟先生高明博雅乞為剖示既云未發本自無念無念則無覺知而能見未發者知耶非知耶知耶已發不知則孰知其中若謂自然而知謂有我而知無我而知有我則非自然無我則自然誰知茲高明見復泛然卒酬未見愚之問端所以大凡辨論必有宗旨貴在問在答處答在問處如箭鋒相值函蓋相契所以問之端倪不可不精思揣其立宗今立宗在于未發既無念覺如何知得未發若以已發未發遂謂已發不中未發亦不中或無是理蓋未發廓然無朕如太虗相似縱已發差處安能纍之如能纍得則虗空亦可彩畫矣惟先生熟玩愚之問答宗趣細見教之高明所謂明覺自然之體此是未發之中者謂明覺自知所以知其未發中耶謂起念覺照故知其中耶自知則刀不自割眼不自覩起念而知則屬已發不謂之未發中矣示胡德修居士從古至今大都學道不成者往往奈何自家身心不下是故生死憎愛交加紛擾靈臺渾濁片餉不得清寧總不知生死何招憎愛何成雖復奔波湖海尋真覓訣為治身心或從眼中看得來的耳中聞得來的攢頭相授依憑扭揑又有靜中得少光景即為究竟長年終日弄鬼眼睛鼓粥飯氣自家身心毫厘竟治不得設臨顛沛流離之際逆順是非之場依舊生死浩然憎愛滿腔紛飛搖蕩方寸中如著芒刺相似此蓋不知自身自心來源既不知身心來源即此身心障礙不淺如是不唧𠺕做去豈惟大道終難悟徹了當日用中敢保從生至死未夢見安間在何則不知身源則見有身見有身故則受身纍不知心源則見有心見有心故則受心勞肇祖云勞勤莫先於有智大患莫若于有身豈欺我哉且道身心來源處現前此個軀殼子不過四大合成現前分別了了此點妄心不過四蘊攢就衆生顛倒妄以此身為身此心為心塵沙劫波淪墜不已改頭換面如火傳薪蔓延無歇大丈夫真心學道何不猛著精彩拍胸自判發一片決定心志直下以四大推身四蘊推心逢緣觸境崇朝至暮綿然無間歡喜也如是推煩惱也如是推推來推去工夫純熟一旦身心廓落蕩然虗明到此境界德修畢竟喚甚麼作身心喚甚麼作生死憎愛德修果然擔荷得真做得不惟成佛有分學仙有路管取參禪門中亦推爾不出德修聞此語不免疑他成佛成仙到參禪門中皆是末事殊不知禪門向上巴鼻諸佛猶未夢見在且道如何是向上巴鼻十方諸佛在何處盡在驢胎馬腹中與智香居士書周沈兩家乃吳江信法之始故汝兩家精進愈熾願力愈弘則松陵之風移俗革可翹足而待者不委兩門居止依怙果四稜塌地否果能之則老漢敢不為旗鼓哉雖然汝所慈輔我大矣惟城山未皇一登或近過之不知汝昆季俱在否德輿昆季其所親即世不知臨命終時不大苦否如不大苦則老漢歡喜難喻如不自在則丈夫不如婦矣老漢也要打草驚蛇捉死怖生不知汝輩眼中果有筋皮裡果有骨否不然則老漢罪過不少與于潤甫墨香庵汝之費心深矣介然寒生費從何來不能而能之非卓有定見則受紛綸之搖此庵安能成也既成矣切須強力忍氣終之老漢蕭然雲外夫耳汝不以富貴當眼而必清高特持委曲焦勞決以初念是克吾敢忘之哉大凡做好人不易賠錢忍氣忍飢所以天必憫之吾聞天憫者必有後或汝異曰此子必當鳴于世吾故附此于來柬之尾以表汝有後之兆云與李次公紫柏道人見地平常行且疏略吾法道中相識或不以其闕陋愛而不棄欲寫其像如具信心亦不可易忽圖之古人有言曰魚相忘于江湖人相忘于道德蓋精神不真終難持久不以持久之心寫之不若不寫為第一義即如聞亦不可以老漢為塞人情之具苟察其果信得吾透念無支路非具禮亦不可為輕寫蓋衆生捨財如割身肉如不能割肉圖老漢老漢亦何故用其戲寫為酒館八仙耶且圖佛菩薩有功德圖吾吾之功德尚不能自福曷可福人吾行之後次公謹體此囑始不負吾答于景素儀部比辱枉顧而不遑一接清塵以傅生在也且貧衲棄置世外之人寸無所長亦不敢輕接賢士大夫向承令侄之歡移錫延陵而道德虗薄無以感物抱慚良多又吾曹得與世途相接者自有標格上則非道德不應次則不過詩文已耳越兩者而有交焉達觀雖不敏懼弗能也如足下不以軒飾自榮于出世法中果爾存神貧道雖不敏敢不全令姪之愛哉大率存神不真比屋千里豈有千里之遙形待情懸而能聲入心通耶故足下如辦心未暇留俟因緣時熟相接亦得達觀勿解作綺語言直近魯唯高明亮之答馬誠所御史辱手書知居士欲激野朽憤發同心雪卓頭陀之死耳敢不承命苐野朽為頭陀之心非為頭陀也為頭陀立言著書每以金湯大法自任此心何心哉如野朽不以此情照之則風馬牛不相及矣又頭陀自刎偈曰志士不忘在溝壑勇士不忘喪其元吾今不死待何時願早一命歸黃泉野朽以此偈觀頭陀之心則頭陀非佛祖聖賢之氣象也智勇烈丈夫耳大抵吾曹出處與俗士不同俗士所見見局乎一世吾曹見通于三世一世偏也三世圓也偏則情多昧理圓則理能制情如孔融李膺臨難皆疑怨不能自解此情蔽理故若少林二祖南嶽思禪師臨難皆能用理制情所以直觀今世有生心殺我者我必前生曾殺他故也故南嶽中十七大毒小毒不知其數一味觀乎往因逆來順受而二祖亦死于縣令之手初不聞二老禪有所不堪受也此祖佛標格如是較諸孔李二君子又何如耶今嗚呼平生語禪而臨難竟不遵鼻祖報冤行消釋宿業以不堪人之瑣碎甘舉刀自刎以跡觀之謂頭陀烈丈夫則可謂真是佛祖聖賢之徒則不可也雖然頭陀佛祖聖賢之理未嘗不知特知而未能行又豈能證而忘忘而用哉今之僧俗雖號稱知禪談禪者則又萬萬不若卓頭陀也故頭陀之死野朽不能說一偈寄香燭弔奠之非夫矣惟高明徐平其氣靜其心諦察野朽復居士之言何如為頭陀之心何如於理果當謹佇報章餘續不悉付密藏開侍者吾雲外夫與世泊然者然于世情若不能判然割斷以法門事重故也或者不察吾曹痛處亦不必介介但盡吾心而已如臺老之晚年吾復全初好與之遊亦不過為此耳據實論護法肝腸使吾心死而服之此老非宿有願力安能若是乎其諸郎中吾甚喜第三者以知其好惡也此老一生委精神于法門而晚年又當為朝廷之大臣適乃人情無常義利出沒之地設精神照顧不及處汝當剖肝竭誠一一扶照之使此老末後不要失了大人局面則使吾門有光也此亦吾輩報其護法之勞理合如此若于中甫傳廣居之出處吾曾于此老言之矣汝當再覿面細論之痛囑之若論中甫為法門之心不下此老但無此老之伎倆耳即傅郎伎倆頗有又無此老堅凝持久之力耳噫人才之難難若是乎文卿絶不見一字來想聞人之聲或疑耶當為凜說老漢天生生鐵禪和子也疑夢不可不醒仲淳與事忙法中極不進其氣魄甚勞頓可哀可哀但在法脉中人汝嘗相會不可要他歡喜埋沒了人古德有言曰心常不與世心和合是精進即老漢豈不能作時態度顧末後纍手耳若論此事設少年無真精神于此則老來便做不得主設臨命終時做不得主便是千生萬劫驢胎馬腹做設生前若無真精神于此則臨命終時做不得主設不得主也由是觀之不以此為慮者皆粉面女耳苐春光可玩那悟群芳易凋哉付密藏幻豫幻居三公曇生來得清凉諸師書并汝等書彼中人境殊勝大可喜江南連歲歉飢人情恍惚非往年比也但道人日用無入不可雖復世緣逆順亦古今常態又何足介哉汝等宜各安心勤勞藏事吾樂多矣此外不必縈懷惟臺山諸公為我一一致之或披晤有期此中諸居士亦佳惟中甫少病已愈也老漢書經一節猶未克邇將完之也老漢正月下旬至留都以吳元石風病甚狂今幸如舊無恙矣又石頭諸縉紳大老率俱雅重于出世法極剋意勤重若繆仲淳葬事三棺地頗多吉凡相知者致聲龍樹尊者道影唐岐山所臨似不失真可當裱莊之擇一軒豁處供之又京師亦不可不持去共黑白隨喜也來僧乃栖霞淨業堂徹天大德高足汝等宜看顧之益其道心慧空雖即世與萬菩薩為侶復何恨焉餘瑣不盡付密藏開侍者汝兩度書來讀之使老漢涕淚莫之止想汝作書時必亦淚墮耶不然山川許遠曷能致斯此淚仗佛護念如墮之不止則鼻祖血脉決不斷矣此脉既幸不斷則大藏造成必有日矣惟願此淚同香水海浮幢王剎流通無阻則老漢受汝等供養豈有窮哉且置是事別作波瀾發其深慈周全難能不委臺老至彼舉止何如大抵世路場中非再來菩薩九人之數必有十人失腳吾以此公於三寶中護法之勤幾四十餘年如吾曹坐觀成敗不回輔之則佛子之心安在又宇泰受性魯直處世非其所長亦當渠識暗處痛提省之吾囑汝二者不可忽之法華楞嚴幸俱書完宇泰叔姪中甫昆玉可謂盡矣汝有書來當一一為我謝之生彼信心或老漢躬詣蘆芽有時也若雷雨阿堂清勝否中甫居家生得一兒甚奇偉此告病利錢也亦老漢願力也餘面悉之付密藏開侍者因謁舍利寺古峰師乃知唐金牛老漢藏骨之處及臨濟玄老靈家往經真定屢矣竟莫聞其靈踪今得舉瞻豈勝感激但中甫過其地而亦未遑瞻禮可笑汝至此勿蹈中甫忽略必當尋其瘞處核其始末要家裡人以筆硯三昧大贊揚之使末世衆生得聆塗毒聲實汝曹分內事又讀其知金牛舍利似不可似升斗量者吾國朝太祖曾禱之得十八粒及成祖禱之乃獲萬餘粒何舍利生分別心略其父而實其子由是觀之設有緣厚于成祖者安知其勿能廣無量斗哉此亦希事録其大略付開郎曇生南來言汝形軀不比往日壯偉老漢不覺心痛流涕久之開郎復不快汝細節強力忍飢惜些些之費勞頓一至此乎若閻王不吞鐵丸便使小鬼不怕是則是矣以細而忽大敦末而微本一旦纍死了汝這一枚人則使藏事孰能始終之此事或不幸纍倒了汝則老漢晚年翻做了活死人也汝果體吾痛處此箇皮袋子為吾收拾如舊壯偉無損之自然使吾無後憂矣良以法門寥落人物甚難揀也汝須大加餐毋添吾憂則享汝供養厚矣吾書經幸將訖若裝飾完汝當身送蘆芽安置之吾即續後懷香禮畢之妙師併板首大衆為老漢一一叱名致之如二經嚴就汝能頂持大都廣會之場普令一切黑白隨喜之要使若聞若見者如老漢為報父母此生劬勞之恩亦辦心書二經而報是恩非感邀他故也汝深體此幸甚凡吾南居動止或有相傳于北者大抵皆出人情好惡耳汝不必念之久後自當一笑矣且老漢楞嚴發足北行周旋六易寒暑一日耳而一日之中凡所動止非光耿不出不為自有木偶人證之又不在吾言也廬山黃龍潭自龍藏惠彼彼中遠近黑白益道心無量茲碧公湛如上人以閣成欲造毗盧金身供之疏文甚奇只據此文必可成之汝弗以勞却委曲其初來又汝不能即發身者知為所負未清故也然則何必限于兩月之間而能辦此設一年不完亦未可定也汝真決離彼使人知汝行者恐亦不妙惟行時且活落言之可便信復也如汝置行跡于棲霞則楞嚴之事安得廢哉思之而藏事又可就現成近都大叢林耆宿道風福緣為之成之也易又人好橫議者亦不搖唇矣然素老及高弟經事老鍊雖不善輕諾如諾之斷不苟也可即來議之不必局償負完而乃至即新刻書板亦當汝至山中共素老及諸高弟論徹後送來可也吾行期猶南北未定汝勿慮也或以我行藏異乎人規我易之是癡子也夫麒麟鳳凰或者駭其異乎形色規其易之是須截其角而燖其毛人則快之矣大丈夫處乎浮世之間適意為樂灑然于塵埃之表寧戚戚乎局于常議也又人之利害于我如佛天下照我寸衷果無天惡人其安能奈我何且凡事到人用力不及處雖父母亦不能代之必須苦樂親受者定難假借于人惟可假者形跡相似之間耳我之賤性長于超放不羈半邊處也亦我真處實人用力不及處也敬煩用力耶如我修行心真自然惡習漸消淨習自增矣此我真言汝宜照之莫笑狂也雪松省入前九月草七燈下附付開侍者汝行後若失右臂慘然不快久之吾嘗責汝雖煩勿生勞倦大都責重則親深放過則路人至於比富門中宰割情識顛倒習垢以青為黃使常我失守新智增明即惱入喜反親為冤或生殺雙行縱奪齊操苟非骨具靈根眼無凡刺聞已憒取況躬遭而內承之哉小子宜自重食須正命毋餐別飯吾是有深意痛忽之山西有汾陽祖塔廢壞積久吾欲募人立石刻汾祖寂音所撰傳不死其靈汾洲有曹祿者孝弟著于郡里且亦當植福為心曾囑其立石渠石買但傳文未寫付去故未完當為雷雨致吾意作一書達新代巡一獎曹生助其善風前院獎過者亦不簡故可為也文道因無人用留用過冬著他上來二十八日雪郎目又吾登峨嵋東還特又登南嶽禮七祖讓尊者并訪思大祖師石頭遷尊者及諸聖靈跡皆荒凉不堪不覺悲痛之追聞南嶽有大藏之頒豈惟慶快老漢本懷亦國家之福諸祖之幸然安藏之所送藏之人二者不可苟且姑順人情須佛祖之心為心可也一者安藏之所南嶽諸剎唯方廣寺道場最古風水最勝殿宇莊嚴僧衆廣盛可垂萬世諸寺莫及吾言真實送藏人到彼自知二者送藏之人須得僧俗並行僧則惟仰崖慶法師足以任之俗則再得信心內臣一人如此乃可掘起遠方風化且不枉國母苦心弘願也楞嚴勝緣當致意法燈及汝信心亦可見矣然須久而愈堅不負學始終視之付寒灰奇公法本乃使亡者魂寧耳大抵藏事汝不必慮此佛慧命衆生寶筏于震旦所繫重矣自有昔乘本願輪者森然宜俟久矣豈待老漢薄福少德之人為縈念耳雖然彼乘輪者若不得老漢些些粥飯氣終是無源思之法本骨石當作三分俟吾安置處所不得妄拆毋誤餘不盡手字復
