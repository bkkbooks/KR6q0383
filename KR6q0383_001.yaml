body:
  text: 虞山白衣私淑弟子蒙叟錢謙益纂閱徑山寂照六世孫傳臨濟宗契穎壽梓雜文阿賴識四分略解夫𢯱剔陰陽之奧囊括造化之精洞鴻濛之源破混沌之竅超儒老而獨高冠百氏而弘深舍唯識之宗而他求未之有也夫唯遮境有識簡心空遮境則識外無法簡空則非同枯滅是以夷斷常之坑塞生滅之路圓彰中道刊定因明魔外望絕凡聖共遵也然識有八種又有心王心所之殊苟非智慧空靈思量妙密豈易窺其庭哉阿賴耶識等大略窮其所由生直以真如照極反昧生滅與不生滅和合謂之證自證分如醒人忽爾昏作人語雖聞而不能了了謂之醒耶又不能了了謂之昏耶人語又聞此之謂昏醒相半迷悟之關也此等時節有人喚之即昏隨醒矣不喚則醒隨昏矣醒既隨昏而外不能了境內不作夢惟昏然而已謂之自證分此等時節位無能所冥然獨存也少頃頓夢種種悲歡苦樂能觀而言謂之見分即所觀之所即相分或問曰見相二分前後生耶抗然生耶予則應之曰見相二分謂之前後生者現量之中不許有無分別纔生分別現量滅矣謂之抗生則能所弗同也此四分乃八識之本故有志於此宗者不可不留神焉四分通徹則八識之綱思過半矣前五識略解夫八識四分乃相宗之綱骨也阿賴耶識末那識分別識眼識耳識鼻識舌識身識謂之八識證自證分自證分見分相分謂之四分究本言之八識四分初無分體特以真如隨緣乃成種種耳夫真如隨緣之旨最難明了往往講師禪衲率皆于此不能出其隨緣所以然也良以真如清淨初無熏染如何瞥起隨緣耶于此參之不已忽然悟通所謂八識四分不煩少檢唯識之書便能了了矣故曰性宗通而相宗不通則性宗所見猶未圓滿通相宗而不通性宗則相宗所見亦未精徹性相俱通而未悟達磨之禪則如葉公畵龍頭角望之非不宛然也故其濟亢旱興雷雨斷不能焉是以有志于出世而荷擔法道若性若相若禪宗敢不竭誠而留神哉惟相宗名義數多若非心智妙密委曲精披實未易明也今則取大略稍論而疏之但粗曉蒙孺耳大抵阿賴耶識通前眼耳鼻舌身五識當併而發揮之似覺明易也葢阿賴耶識及前五識皆屬現量又皆上品果中轉也若第七識第六識則三品皆具三品者見道為下品修道為中品究竟為上品故六七因中轉也若以三境三量三性五十一種心所法言之則前五識量惟屬現境惟屬性善惡無記三性皆通焉心所法則惟三十四耳頌曰性境現量通三性眼耳身三二地居徧行則境善十一中二大八貪嗔癡五識同依淨色根九緣七八好相鄰合三離二觀塵世愚者難分識與根變相觀空唯後得果中猶自不詮真圓明初發成無漏三類分身息苦輪此頌前八句惟明有漏後四句明無漏耳又八句之中初二句言五識三境惟屬性境三境者謂性境帶質境獨影境三量則屬現境惟三性俱通三量者謂現量比量非量三性則善性惡性無記性是也又此五識以界地言之惟欲界五趣雜居地識識皆全至于初禪離生喜樂地五識不全以上二禪既無尋伺故鼻舌二識不生也葢禪天無段食故段食以香味觸三法為體段食既無則此二識不生明矣現量之義說有多種現謂顯現取境親明故量謂量度故若心心所緣境之時離映障等顯了分明得境自性所謂得境自性者以性境根塵能以八法而成各有實體相分各有實種生有實體用現在實法故即所緣唯識也又現屬境量屬心或俱屬心或現屬根量屬心依士持業依主三釋西方釋名有六種一依主二持業三有財四相違五帶數六鄰近又有依士釋此六釋以離合名之者葢六者互相離合故六釋一一具二名若單字即非六釋以不得成離合相故初依主者謂所依為主如說眼識識依眼起即眼之識故名眼識舉眼之主以依于識故曰依主亦名依士者如父取子名即若此老頭兒某官之父也又離合者離謂眼是根識了別根非即識識非即根故曰離合則根識不分而同呼故曰合言持業者如說藏識識者是體藏是業用用能顯體體能持業藏即識故故言持業識也又名同依識藏即含藏用識取了別用此二同一所依故曰同依識言有財者謂從所有以得其名一如佛陀此云覺者即有覺之者故當名覺此即分取他名二如俱舍非對法藏對法藏者是本論名為依根本對法藏造故名為對法藏論此全取他名亦名有財義者何釋言相違者如說眼及耳等各別所詮皆自為主不相隨順故曰相違言帶數者以數顯義通于三釋如五蘊二諦等五即是蘊二即是諦此用自為名即持業帶數如眼等六識取自他為名即依主帶數如說五逆為五無聞無間是果即因談果此全取他名即有財帶數言鄰近者從近為名如四念住以慧為體以慧近念故名念住既是鄰近不同自為名無持業義通餘二釋一依主鄰近如有人近長安住有人問言何處住答云長安住此人非長安以近長安故云長安住以分取他名復是依主鄰近二有財鄰近如問何處人答云長安以全處他處以標己名即是有財以近長安復名鄰近頌曰用自及用他自他用俱非通二通三種如是六種釋此六釋凡註釋經論必用之者如註釋八識非以此不能發揮便當有條五五次二句敘言五識心所也五識心所編所有五別境有五善則十一中隨唯二大隨有八加貪嗔癡三合而言之三十四耳五識同依淨色根者言此識所依之根非浮塵根乃勝義淨色根也此根非肉眼可見惟具天眼者能見之九緣七八好相鄰者此言五識生起之義必借九緣乃得生起五識九緣者謂空明根境作意分別依染淨依根本依種子也合三離二觀塵世者此言眼耳二識離中取境鼻舌身三合中取境愚者難分識與根者此言小乘愚法聲聞不知根之與識各有種子現行妄為根識互生也根之種現但能導識之種現謂根為生識之緣則可謂根能生識則不可矣以識自有能生之種子何為能生識之種子故小乘人未除所知障智淺心粗于法不了故不信大乘唯識教也此五識有漏限此後四句者發明無漏義耳變相觀空唯後得果中猶自不詮真者此言小乘人謂無漏五識可以變相觀空故大乘論師破之曰此無漏五識在佛果位中尚不能親緣真如況因中耶圓明初發成無漏三類分身息苦輪者此言五識因窮果滿則相應心品俱成成所作智現三類身止息眾生苦輪也葢佛果位中第八識轉為無漏白淨識已而相應心所即成大圓鏡智豁然現前故云初發而前五識亦同時轉識成智矣既成成所作智則三類分身有何難哉言三類者千丈大化身被大乘四加行菩薩小化丈六身被大乘三資糧位菩薩及二乘凡夫隨類化則三乘普被六趣均超或問前五識成無漏相應心品現身益物何以先言第八成無漏耶以圓明初發乃第八識相應心品成大圓鏡智故且前五根即第八識所變相分能變本識既成無漏所變五根自當即成無漏矣能發五根既成無漏則所發五根遂成無漏何疑哉或曰能言八識轉成四智何故却言相應心品耶對曰唯識第十云此四品總攝佛地一切有為功德皆盡此轉有漏八識七識六識五識相應心品如次而得智雖非識而依識轉識為主故說識轉得又有漏位智劣識強無漏位中智強識劣為勸有情依智捨識故說轉識成智也予初言八識五識轉識成智當併而註之亦此意耳此解已見全集中以大師教學人深研相宗其中詳略互異故並存之以備參考元注云此篇八識之綱思過半矣已上是大師于東阿旅中為如聞說者明午南下不及說竟夫八識四分已下如聞後請大師續說只記得前五識十二句頌變相觀空唯後得果中猶自不詮真此二句善言相宗者常交互而不清以不達安慧所計及護法所破故耳葢安慧宗者小乘不知有八識所知者唯六識耳六識既滅似無分別似現量用事便謂無道可進殊不知小乘所證者全是無明即第八識中不覺也故安慧妄謂因中無漏五識即能緣如此五識以大乘觀之安得無漏哉以其通善惡無記之性小乘粗惡雖盡細惡尚在謂之無漏可乎謂之緣如可乎故大乘護法以此二句破之護法意謂變相觀空唯後得智可能而後得智且非因中可得要待轉八識為根本智已方得此智所謂根本而後得此是果上事非因中薦得也此智果上可以變相亦不能覿體緣如以根本智是實智後得智是權智實智可以緣如權智可以應俗權智果上縱能緣如不過變相耳不能親緣也然此五八唯果上轉識成智六七因中便能轉矣如安慧言妙觀察智因中緣如則亦可通執無漏五識能緣者大可笑也原注云五識至果上轉名後得智時也只好變相緣如而非親緣故護法說此五識至果中猶自不詮真如豈五識於因中得親證真如耶此二句頌乃護法出正義以破安慧之義毗舍浮佛頌說示如裴毗舍浮佛此言一切自在覺既自在覺矣有何物而為障礙哉然未覺者不免觸途成滯見色則被色障礙見空則被空障礙忽然而有身則為身障礙介然而有心則被心障礙身障礙生老病死心障礙喜怒哀樂是以周旋于一光之中而妄成角立既角立矣一切不自在至矣生有老迫老有病迫病有死迫喜有怒迫怒有哀迫哀有樂迫迫者相催之謂也嗚呼生若定常老不可迫喜若定常哀不可迫以其無常流之莫能已也惟有道者達身無常四大成故達心無常前境生故達四無常一身待故達境無常因心有故借一蕩四四無所立借四蕩一一無所存借境蕩心心初不有借心蕩境境自不留一四互蕩心境兼忘一身而為無量之身身相不壞一心而慮周萬物寸抱本閒由一切不自在入一切自在達之者剎那可以超曠劫如其未達解脫幢即成行屍肉塊智慧津梁翻作苦海業浪自古及今豪傑英雄打破這關捩子不得雖功高千古名光萬世於本分事上了無交涉故生時受生迷老時受老迷病時受病迷死時受死迷喜怒哀樂時受喜怒哀樂時迷以迷續迷迷無斷日人為萬物之靈而靈不悟以靈續迷為一切黑業本山高水積未有撼竭之時少知自反者安可不懼乎又靈如融通之水迷如窒礙之氷融通則在方而方在圓而圓窒礙則方則定方圓則定圓方圓無滯之謂活方圓有定之謂死是故聖人居方圓而方圓莫能滯以無滯故所以能通天下之情眾人則不然見方而被方惑見圓而起圓執所以在聖人即死而活在眾人即活而死故聖人謂之生人眾人謂之死人由是觀之自上古以來所謂生人者能得幾何哉為聖不難難在通靈苟能通靈非惟身心俱靈大則虗空天地萬物之夥微則一芥一塵一毛一髮靡不靈矣至於三藏六經諸子之流百工之技亦無不通故達身靈通無事可礙達心靈通無理可障化生老病死為無上涅槃迴喜怒哀樂證大菩提涅槃菩提從身心得若無身心二果何階故曰此身為塵勞山此心為雜毒海一旦達身無己塵勞山即功德聚也達心如幻雜毒海即般若漿也人為萬物之靈不自重甘為死人不為生人可悲矣送龍子歸潭柘文潭柘龍子靈應異常其衛法也甚固歲在丁亥我將禮普賢大士于峨眉顧惟水陸間關夷嶮莫測乃白龍父余雖不德忝為佛子行邁在邇其尚有以借我既而達龍泉客濟南青堐觀一夕夢小青逶迤緣壁而下無何開侍者至謂開曰夢蛇而若來異哉對曰和尚杖錫將西此必燕山龍之來赴盟耳自是每食出生次必祭諸龍子龍子夾輔䟦涉三易寒暑履波蹈險冥護實多己丑我始東還結夏曲阿于觀察別墅則龍子現形辭我欲歸故居嗚呼龍為鱗蟲之長能大能小能隱能顯智德威靈變化多種如多頭現毒摩那斯慈心難陀歡喜優鉢羅黛色婆伽羅醎海此皆或以德或以威或以處故名或人其龍德非我所知也潭柘大青小青夫亦龍族奉如來敕藩屏伽藍蛇形而佛心類異而敦善見人不怖遇物不傷歲或不若雨暘𠎝期百穀憔悴農人悲惶二青顯迹吐沫為雲噴涕為雷彈指之頃潤霑大地枯者頓蘇僵者立起顰蹙而望者鼓舞歡忭于是感青惠施金碧其宮昭廓其神代有銘志以示無忘禮也余道不勝習萬里周旋勤諸龍子恬不告勞可謂畢力矣敢不躬造闕庭以不腆之幣敬致龍父奉還令子行恐後世不知龍德我姑識之以傳不朽仍願龍之長幼藉佛寵靈得無上覺道為大金湯於不替也萬曆壬辰歲夏五月二日達觀可道人撰蜀道古今稱嶮絕峰岢削立江漢渦漩如沸自非神力夾輔不免于驚我大師之謁蛾眉也雲水其蹤果然往返乘安流蹈夷徑豈非至人之餘事而潭柘龍子功不可誣或見童子預報前茅或示大手用拯湍險比大師夏于曲阿則現其常所見形以辭事敢不為之曉乎余既坐東磵愛其水聲廣舌寧不憶其大師昔年會眾說法此間自為言二青靈異狀抑又聞龍子侍遊峨眉故余有泉水不湮塵外錫薜蘿猶挂舊時衣鶴來句曲雲先待龍去峨眉雨未歸之句頃余讀送龍子文知龍子悉矣子其行也作詩送之颯颯雨露微風吹木葉飛行從北山下坐見小龍歸蜀雪崖珠絡江雲護寶衣可知霑法力臺殿展光輝嗟乎余望龍子在罏匕之間龍子今歸故山而我猶躭病鄉也弟子如鵬謹䟦天池山煆昏散道場說原未煆昏散之椎輪三世諸佛迭相授受者也第在用之何如耳用之果善消昏散於剎那扶止觀於大寂隕山河於未始有地蕩身心於無得之鄉斷欲結之利刀資靈軀之正命効見當人之勇心遊象帝之先本有神珠光明在掌初非他寶價直誰酬即凡身而證佛身依俗諦而造真諦功高空施德富難量誠以行人一息昏散清即一息佛一念昏散清即一念佛耳嗚呼茫茫苦海之中凡有血氣之屬莫不抱靈而頭出頭沒不可勝計設有一人能於椎輪之下清一息一念昏散成一息一念佛者若以佛眼觀之則其功德信不可思議況夫多時日者乎葢人貴自反果能反照自己分上昏散自生至死剎那有停息乎故曰若人靜坐一須臾勝造河沙七寶塔寶塔畢竟化為塵一念靜心成正覺如或用之弗善亦不荒失人天福田是以黑白賢豪能言者宜游揚贊嘆有力者宜護持周給凡道場所在等心助揚之此文已收全集中矣天池道場迄今尚為魔外之所據經過此地者道俗四眾無不傷心故拈書天池山道場等字以為人天眼目觀者幸為著眼庚子長至日蒙叟謙益謹識題包生所刻楞伽經夫身不自身由心故身心不自心由身故心由心故身身不可得由身故心心亦不可得身心既不可得則智山獨立覺海澄渟情識路窮能所寂斷矣若然者豈惟眾生不可往即具大神通亦安能往哉此經以五法三自性八識二無我為宗為根熟菩薩直明識體全真便成智用楞伽此言不可往乃表心地法門非修證可能入故凡讀此經者能直下究竟身心無路自性無門則肉身凡夫可立往也馮太史謂予曰包生新刻楞伽經字畫精簡明白顯朗使人覩之心開目明乞師一語為流通前茅何如因書此般若波羅蜜多心經略解敘夫般若大部數百萬言如滄海雲濤汪洋莫測是以菩薩流慈束廣成略爰有心經文言要約旨趣全歸自唐迄今註疏駢出高人淵匠迭震靈響機緣靡定好樂無常取此節他互有損益俾後昆淤疑致非一矣練川侯觀察復吾知寶斯經津求奧義亦由檇李許參知為之良導故得徵問于予因為法界略解以慰其狥法之志達道人自敘示鮑生持楞嚴經一心不生萬法何咎首楞嚴此言一切事究竟堅固即此而觀智鑒意近理究竟堅固如來義近事究竟堅固何以故情生則智隔一心不生得非情未生時乎設情未生則無事不理無情不智耳予故曰智鑒之意近乎理究竟如來近乎事究竟昔雪峰示眾曰二僧却真實為人玄沙曰萬里神光腦後相又曰髑髏即金剛體此皆非事究竟堅固之樣子乎鮑生果能於智鑒句中薦得則如來句中未夢見在於如來句中薦得則雪峰玄沙句中未夢見在如能於種種句中透徹無礙則十軸楞嚴從頭至尾由字積句由句積軸橫捺竪拖無擇精麤有心無心莫非究竟堅固也如於種種句中未能透徹則不妨朝持暮持榮持辱持開眼持合眼持阿屎放尿持穿衣喫飯持持來持去生持死持一日一持熟則髑髏𨁝跳放金剛光作覆盆之日月有何不可如持經不遵此持何異春鳥晝啼秋蟲夜鳴者哉鮑生勉之䟦照公墨書華嚴楞嚴本朝尹山隆菩薩少年時血書華嚴經法華經各一部及高皇帝開試經度僧之例有業不精而妄應者帝怒坐及三千僧皆邊遠充軍隆公特往京師願焚身贖眾僧之罪帝允之敕有司設道場嚴侍衛公躍然登之身將半燼烈焰中猶手書風調雨順四字囑內使曰俟天旱焚之後果亢旱帝焚之即沛然大足帝曰此永隆雨也嗚呼隆師血書華嚴法華二經時初無求效之心及焚身之際大光中露此三昧使天下千古仰而戴之當時道亦賴之大振皆自心不欺之力也今去隆師二百年尹山復有僧明照者墨書華嚴楞嚴各一部雖用墨不若用血然其最初一念不欺之力未始不同焉予登峨嵋道夔之萬縣見一老僧書華嚴以精懇䖍篤不覺暗中書經達旦偶隣僧說破即不能書楞嚴曰因明有見暗成無見不明自發則諸暗相永不能昏若然者隆師焚身之際火光亘空與夔之老僧暗中眼光不昧皆不明自發之光也照上人書經時能猛加精懇以增上之緣熾薰自心則此光之發不獨前人有之上人當勉之熾盛光如來陀羅尼經䟦夫聖人無常身因眾生所感之機而示身焉是故釋迦如來示丈六身逗娑婆機也若無量壽覺則身非丈尺之可量矣矧乎熾盛光王如來以光為身以願為輪以慈悲為輦以大白牛為精進徧遊於星宿光中而作佛事者耶然眾曜之光本之此光分焰乃能變化無窮故五行七政經緯璇璣為善者應之以吉祥不善者應之以咎殃雖曰眾生機感而彼佛如來神力以大慈力威神故憫諸星宿變怪駭怖世間乃說吉祥陀羅尼折伏之俾凶曜伏降吉星懸朗是以一切眾生於此吉祥陀羅尼應當志心奉持其持誦之法或制輪佩身或以真言意持若未臻靈應當更發增上願心可期必克迨乎應念響臻密非外得心法不二本末同歸可呪枯木以開花喝頑石而使裂乃至易短折為長年變無嗣為螽斯種種祈求必獲如願揆之以理豈外一心嗚呼木石無情尚能因呪轉變何況人心本覺為物中之至靈乎苟能因理生信而持因持得徵則神呪之力與信力交入融固必然也乃若澡身以軍持單線以拽山此難斷慾至人遊戲之事猶然不可思議況復善男子善女人於此經呪信心不二精勤奉持其能鑄變怪為禎祥化凶禍為休慶固必與至人三昧等耳雖然微我釋迦如來憫此堪忍隱無量威神甘為熾盛光王之紹介接彼有情置之吉祥光中焉能如萬卉在春穠纖俱麗各各自足而萬卉不知也哉佛弟子賀懋熈受氣孱弱而為宗子顧惟壽命不長無遑盡奉養之勤以是發心刻熾盛光王佛出相吉祥陀羅尼經壽諸天下凡有如懋熈之願者因經得呪因呪得益譬一燈光傳百千億百千億光傳之無盡生生世世在在處處恒為熾盛光王如來之眷屬以弘法為家務更願凡因此經得益者滿願如熈等無有異因斯希有轉相信奉以臻覺道寧非堪忍界中一入路乎題三教圖我得仲尼之心而窺六經得伯陽之心而達二篇得佛心而始了自心雖然佛不得我心不能說法伯陽不得我心二篇奚作仲尼不得我心則不能集大成也且道未一句如何播弄自古群龍無首吉門墻雖異本相同䟦石刻法界觀華嚴法界觀辭旨冲漠大經廣雅囊括盡矣丹陽賀生學仁欣然石刻印行達觀道人一語因書與之時萬曆辛卯四月二十一日也懷州牛喫禾益州馬腹脹天下覓醫人灸猪左膊上此又杜順老漢注脚耳䟦石刻圓覺經此神通大光明藏我釋迦如來入之乃說此經十二大士入之則能酬酢精辨如瓶瀉水了無滯澁丹陽賀上舍喜圓覺經刻石流通之乞予一語為之嚆矢因書此時明萬曆辛卯四月下旬一日也䟦石刻八大人覺經此經三百七十一字八覺精光雖則曲照多方詮攝殆盡其辭冲遠簡朗旨趣弘深非懷抱日月者豈易措筆一覺悟世無常心為惡源二覺多欲為苦少欲自在三覺知心無厭慧業痛治四覺懈怠墜落勇伏四魔五覺愚痴生死多聞益物六覺貧苦多怨惡人等慈七覺五欲過患俗人偏念三衣瓦鉢增淨力勢八覺生死熾然苦惱無量願代眾生受一切苦使究竟大樂夫達世無常則前塵無得知心為惡源眾苦自息貪欲既止枯淡常足慧業非勤染習難治至于俗人念三衣瓦鉢代眾生受苦俱令安樂雖復覺覺殊功要之即現前一念情識之心不善用之則三塗橫起善用之則三德圓明也此經元普光雪菴頭陀以為沃宅清涼之具檇李福城東塔寺壁清涼觀國師頂門之上手澤猶存魏塘光德菴如谷東公臨終之夕以手寫此經授其徒某且囑曰吾雖大事未明幸將殻漏子脫於寒雲之中藉文殊老人與萬菩薩慈悲之火闍毗之可謂慶甚更何憾惟此經累汝刻石施人則我死猶生也其萬曆辛卯正月初五日於王氏墨香菴向余言涕俱出曰此先師命也某聞鄣山丁氏南羽者龍眠再來也不揣暗短欲仗慈光乞一佛影併此施行不知可否嗚呼東公臨死而不忘法其徒後能𠼫命持骨石不遠數千里還自清涼有子如此死者何憾焉余哀其誠命丁生成褫之且為記其歲月云萬菩薩緣起引夫聖人無常身以眾生為身如片月在空影臨在水有見不見則水有清濁非無月也我觀音大士以聞思修入三摩地初於聞中入流忘所獲二殊勝成三十二應使一切眾生心水清淨隨緣而得見焉由是論之則菩薩眾生初非有別以聞思熏之即得入流忘所圓通妙應以食嗔痴熏之即順無明流墮諸趣以故菩薩憫其同體即所自方救療群有駕大慈悲分身散影隨類利益滇南清禪人一日病幾死夢觀世音勸其念自性佛遂療由是發心圖大士萬身普施供養報菩薩恩信入意地情見乎辭余見其涕淚俱出而作是言因慨焉為之述此夫清禪人以篤疾為水得覩菩薩清涼之月達觀道人聞其言即直下不疑則以不疑之水亦復見之願諸淨信各各若我直下不疑則菩薩清涼之月在在而見雖然眾生業重不疑為難且向第二門頭往生極樂共觀彌陀聞無上法音又普門中最方便處也韋提觀境稽首釋迦佛恩逾昊天德父母生育我無能使不生君師資教我無能令出苦惟有大雄氏慧光破我迷慈悲攝受我令知生不生令知苦出苦指大捷徑路使我坦然行觀想光為燭破斷常黑暗願力為金繩牽至極樂國彌陀相尊特妙好難思議諦觀在眼中曉然如皓月乘佛慈力故眾觀悉成就觀光如大鏡清明若秋水依正影現中交羅而不雜觀成正悲喜忽生一種疑我身居穢土作想阿彌陀眾妙即現前歷歷了不昧設若念不生聖凡在何處唯願無量壽放光破我暗一切同疑者亦願淨疑垢姑蘇華山寺募緣疏凡土木之工不可輕舉雖王公大人有所興復若不先斟酌而遂圖事必費廣而難成況深山窮谷之士乎雖然心為萬法本本立則事遂由是觀之事無大小先以立心為本故孟宗王祥立心在孝則寒林為之抽笋堅凍為之躍魚也華山去縣治一舍許山石峭拔巖深秀池生千葉蓮老子枕中記云服之可以羽化居之可以度難復名天池者昔虎丘晉王珣王珉舍別墅為道場一山兩寺亦此類也萬曆辛卯夏至日紫栢道人登天池道木瀆忽飄風驟雨竝作乃停舟明月寺前次日問明月主僧得姑蘇志讀之是知吳中名藍真宇十廢八九矣即華山寺去城差遠與俗非涉或者欲易為遊樂之舘焉曇文上人慨然願新之道人摩頂慰之曰汝不聞王公大人苟有土木之役必鄭重圖之計汝衣惟一衲食惟一鉢地無卓錐之隙敢圖勝事乎上人愀然對曰既為佛子當報佛恩昔包胥申一哭可以存楚韓雖三戶可以亡秦文雖不肖但恐發心不真則難圖心果真滄海可以戽竭泰山可以崩裂今華山僧房已備第正殿未新文生是心且檀越復尚賢輕利者和尚毋多憂文計之久矣道人再謂之曰倘檀越舍地而不舍價子又奚若文曰計其價不過三四金當次第乞之況蘇為天下名州豈無賢豪長者為之樂助哉且卓庵斷凡皆文同志道人合掌稱常住三寶願文子強力忍垢始終其事當為渠說末後句酬其勞未晚也峩嵋山飯十千僧大點心疏盡大地是一箇饅頭誰能下口撞着主化分二厘銀隨自發心或千錢百錢乃至十錢歡喜施來或一佛二佛乃至萬佛就緣齋去譬夫水銀墮地顆顆皆圓月鏡澄江頭頭皆滿本空上人以熱饅頭聊當金牛之飯達觀老漢以古雲門餅喚作可口饅頭米是一般由人做造敢問十方善男信女及行脚上座且道古人家風是今人活計薦得者許你掉臂橫行如或未然須乞我饅頭錢來咄修徑山放生池記予自峩嵋還寓曲阿每思登徑山禮諸祖師骨塔因緣未便至萬曆辛卯二月之望始克遂願沿大人峰尋天目來脉見一池可三畆許周甃以石名曰放生池遠久蕪沒使湛然玄津天光不接予甚慨焉因為于比部之于廣燈許新是池及還則廣燈有疾且瘳瘳之日即予許新池之日也因語比部相與感諸祖慈庇遂捐金新之䟦吳江永福寺吳明卿募緣文紫栢道人於雲陽道中讀居士永福寺募緣之文喟然嘆曰楚人有吳人之心吳人豈無楚人之心哉且周仲大為之嚆矢瓦礫化為金碧將指日可待矣紫栢道人再問修寺之意仲大則曰修寺在乎存教存教在乎闡理闡理在乎明心心既明則三藏六經皆我注脚也況其他乎道人高仲大見遠而理明遂述此募脩天池寺山門疏吳門佛國山天池寺廻峰抱寂碧水長流雅稱禪栖境實希有紫栢道人每過而樂之凡香臺名室像設所安幸皆修飾惟三門凋落未得英檀道人聊為倡二十人緣人乞銀二兩完茲勝事況三門譬人面眉宇而眉宇塵埋見者曷勿惜哉萬曆辛卯四月二十八日紫栢道人題于天池蓮花樓中下邳弔留侯詩後語即此觀之則子房佐漢非為漢也志在報韓報韓克之此情遂死吾曹求無上菩提若情不死決所欲未遂也殊不知欲不可遂如遂之長劫淪墜而已安有出期耶讀靖節桃源記語予於虞山之陽長宕湖中讀陶靖節桃源記忽覺心曠神怡乃悟武陵漁人即洞中人耳若非洞中人豈能一見山口有光便捨舟入口中坦然直進了不生心視身若無有哉故能窮桃源之趣而得洞中之實者脫無漁人之胸次介然生心思與洞中人共語殊可笑也䟦王房仲林間錄賀知忍赤肉團上無位真人暫時不在王房仲以白拈賊手段盜去此錄是錄不以古今銓次三百條白拈家法覺範老漢於石上林間積錄成書故名此中大都皆古德活句居多至於宗教典刑亦燦然在目昔大慧禪師每舉師翁教子作賊之喻喻參禪者不以倚靠夤緣自悟本心始許渠紹白拈種草紫栢道人却不然從教人家男女會作賊不會作賊摠與他受個白拈法子或有旁不禁的出來饒舌道人緩緩地向道按牛頭喫草也不是分外送寶山慶公之姑蘇訪丁南羽序昔范陽蒯生善為長短說如蜜中邊聽者皆甜秦青善悲歌聲震林木響過行雲使薛譚終身不敢言歸代之五臺山有仰崕慶公主寺龍泉時善說法要使聽者如童穉得蜜如孝子依親悲喜交集戀如也故一半千日若彈指頃龍象雲委香廚妙供亦自然充足豈蒯生秦青夙承佛記現比丘身而說法者乎唐吳道玄床李伯時皆以畵鳴於世雖風致各臻所妙然離自心光皆無所施其巧焉予以是知二子者皆以道寓技者也鄣山丁生善寫佛菩薩像生氣意態使人瞻之道心開霽莫知然而稽顙之不暇豈吳生龍眠其前身也歟丁生聞予道慶師之高方將褁粮問法慶師聞予道丁生之奇遂不遠千里求丁生寫諸祖道影藏之峨嵋衡嶽意在慈波慧炬照潤千古殊勝事也余嘉其志因向所撰疏𢌿之并書此以壯其行且為請謁丁生之地耳東梵川說王維別墅謂之輞川者以所標其人也渠甞曰一興微塵念橫有朝露身如是觀陰界何方置我人余每深味斯旨則不覺身心都遺所謂卓然而獨存者譬如微雲散長碧一輪圓滿生心即殘矣余脫白以來浪跡江海三十餘年然于吳中雲間曲阿乞食禪憩實多雲間有康孟修氏獨募輞川之風亦頗味于無生之學而曲阿于中甫氏意況清曠亦似孟修孟修別墅碧溪抱竹楓樹縈藤春深花香空翠交映有禪思者寓之則彼皆無生資也設騷人墨客來遊則詩思入微亦皆彼為之梯矣即中甫靜室亦四圍流水池沼汪洋雖花木竹篠吟風爭暖不下孟修所居第曲阿別墅人多而天少余虗其心而公其辭伯孟修而仲中甫焉遂名雲間者謂之東梵川曲阿者謂之西梵川或高人勝士有聞二氏之風而悅之者能抽思吐奇藻飾園林昭廓禪旨則鄙夫深望也萬曆二十二年四月初三日達觀可道人書于東梵川白雲西閣康園幽曠雖輞川之勝恐未過也但時流抱俗懷近昧天真而譁世態却謂蕭瑟難禁似畏久留五茸名州園去州又不遠唯孟修能卯郎能來老人能獨樂于二人之表即花神木客亦窺老人有無不能也況其肉食者乎園兮園兮去或來兮來兮未可期青山白雲欲何之年光等石火世路蟻旋磨一息喘不繼子女徒悲呼九原少相識未死應慮之此語須共徐三同覽手字付孟修雲間輞川即事兼懷諸法侶只因地僻無人到更為池清有月來惱殺藤花能抱樹枝枝都向半天開此篇句放而思遠寄無情諷有情即有心會無心噫當興懷之際而識境超然非本色人顧未易知也憨憨可禪人祭了然關主文夫人所以有生死者以其執我耳我相若空誰嬰生死故曰吾有大患以我有身無身奚患焉而身之所成又以四大攢集如三十輻為一轂如此者生可也死可也無可也有可也奚患焉吾了然師初以習講為志故三吳叢席靡不經歷既而為法忘軀傷餓遘疾自惟軀殻郎當識精昏弱由是終年閉關疲以接人余曾扣關請益喜其教乘精到吐語出常萬曆戊子八月余挂錫五峯山中一夕夢雙塔離崩一倒于南一倒于北覺謂二三法侶曰此何祥耶或對曰老漢昏沉識變虗結成夢皆自心浮想所現耳越日而師之受業徒道開至自聊城以師計及東禪月亭法師清涼無邊禪師之訃告余聞之不覺肝膈愴裂嗚咽移時得公開講三吳福公清苦五臺而師則尤以佛法知見自治其心皆法門棟梁何蒼天不佑竝折乎一時余與師同庚公棄我先歸余猶飄泊風塵愧師良多雖然以四大觀身則一忘而四存以一身觀四大則四忘而一存以四忘一一無所忘以一忘四四亦無所忘所謂我執者又將安寄如是則先歸者歸無所歸未去者住無所住此旨乃吾師閉關活計必非死生之情所能蒙昧者也瓣香懸炷聊奠寸心尚饗薦鶴林渠公亡父居士生不見居士死却聞究竟生與死如環上終始以是之義故聞與面見同既見死不弔於渠公非安非安不以情楞嚴薄肝腦廢剎一旦光光從真心出以此功德海亡者生善處悼太虗亮公夫龍之為物神異莫測大可以易形千丈細可以隱質秋毫及其嗔睡婬欲之際則本形自露若然者龍雖神異能於有心而不能於無心也太虗亮公著沙門服能世諦事忽略繩墨故同曹每譏之及臨死時雖病骨頺然見常所識者猶談笑自若不以一死累其懷乃挺然脫去亮公踪跡豈可以有思惟心測之哉紫栢道人感而悼之曰公未死兮人多疑公既死兮人多思死生不可昧兮心自知公其有靈兮允我辭弔沈少江居士一切眾生見身可得是謂愚痴認知覺為心是謂愚痴且道愚痴現前般若在恁麼處仰勞大眾助稱摩訶般若波羅蜜繞靈三帀且道般若現前愚痴又在恁麼處少江居士聞我音聲了得過去心不可得現在未來心不可得咦門前流水長無盡無限魚龍唱鷓鴣弔沈居士母生死無定義但隨四大起見有謂之生見空謂之死死生有情見見亡登佛地我因弔尊堂信口說此偈昆玉如薦此芳靈受佛記
