body:
  text: 虞山白衣私淑弟子蒙叟錢謙益纂閲徑山寂照六世孫傳臨濟宗契穎壽梓語録修行四難修行易而悟心難悟心易而治心難治心易而無心難無心易而用心難凡聖情盡體露其常隨宜出興不失于時故曰用心難如倚門傍戶者大都不可與語此也學佛者倚傍釋迦學儒者倚傍孔丘學道者倚傍老聃離却依傍露地上立腳如師子王往返遊行跳躑自在了無依倚惟悟徹心光者信手便用信手便用方是隨宜出興不失于時者也若定上座從臨濟來或問如何是禪河窮到底定即搊住擲向橋下有同行解之定曰若不是這老凍膿直教禪河窮到底定可謂信手便用者矣總論隨宜出興善用其心處如是之用出世即名為佛經世即名為儒養生即名為老彼倚門傍戶者譬猶賈舟自無勢力假冒他勢扁其額曰某翰閣某部寺某臺諫以欺誑一切不知者解不望風而靡若彼真主卒然相值則所冒扁不惟不敢張炫而且覆藏之不暇嗚呼男兒家頂天立地睜眉弩眼高談闊論孰不自謂聖賢豪傑之徒一旦撞著個沒面目漢子將無孔鐵鎚輕輕敲擊未有不眼目動定支吾不及如是而安望其能知四難之旨乎示衆大抵衆生之機不越四料簡有高而不能下者有下而不能高者有不能高下者有能高能下者善教者隨機接引又一僧作長歌送師北行字畫不楷內有差舛掌之曰今之學者且莫說向上巴鼻即進退辭讓之節事師交友之道茫然不知學恁麼佛法示塗毒居士書云我今止有報佛恩一事𢬵却自命一切利害毀譽非我所知我逆逆順順淺淺深深非汝輩所知中峰禪師刻石殿偈云生生菩薩家世世常出家心不忘般若身不離袈裟師令緇白念誦曰修行人多墮富貴皆由願力輕微心有染著永嘉大師所以這般發願又云弇州王居士臨終願生貧賤童真出家歸依大善知識却難得俗諦中人入吾法中如人溺大海露髮髻子善知識提携如援髮髻子相似須自家盡命掙著不然是自要沉沒千佛出世也難救取師問陸生云昔支公有言知廢則覺全旨意如何陸云知廢可以全覺又問汝知曾廢否云不曾又問汝是知否云是師云是知知不知師問僧云汝曾念圓覺經否云今日念一部又問圓覺經云如來入於神通大光明藏田中蝦䗫入神通大光明藏否云入又問既入神通大光明藏云何又做蝦䗫云不入又問一切衆生皆證圓覺又如何理會云佛意一切衆生皆可修證圓覺師叱之曰若一切衆生皆修證而證圓覺者何不曰一切諸佛皆證圓覺僧無語示衆余讀普門品至於若多淫欲常念恭敬觀世音菩薩便得離欲若多嗔恚常念恭敬觀世音菩薩便得離嗔若多愚癡常念恭敬觀世音菩薩便得離癡不覺掩卷三嘆感聖言之明白照著皎如日星無奈讀者於平常中作勝解想所以本易而反難也夫三毒者果有性乎果無性乎如其有性則常劫恭敬稱念菩薩終無空理如其無性凡觸不可意事及可意事何即怫然而怒欣然而喜耶余以是知三毒菩薩出沒無常如一指之屈伸耳凡讀經者於此了然不惑則普門示現豈獨觀音能之我不能哉示僧明璿大凡男子家立心作事先要究明源本源若不清流必昏本若不固枝必枯故學出世法先要洞明自心然後昭廓心境窮內外典籍而大其波瀾則化風自遠矣人天自嚮矣學世間法亦先要講明仁義擴充度量凡經世糟粕亦須嚼過復加真實心地行之既久一旦臨事自然接拍成令矣又洞明自心貴在情死蓋情不死性不活則於博地凡夫欲其直下轉識成智心境圓通安有是處故情不死豈惟禪不可參即問學亦難到精深處吾與汝先授五根本戒者亦願汝根門潔白攀緣自斷情亦漸死耳設情不死夾帶修行謂之野干種何哉以其自生至死若靜若動若穢若潔若精進若懶墮無非情故故曰萬物浮沉於生死者情為其纍焉且道情死一句子又作麼生舉揚是佛是魔皆蠱毒非魔非佛總冤讐直饒棒下翻身漢未入黎奴白牯流若學世間法非老漢本色他家自有門頭在茲不多說惟源與本不可草率則種種皆然汝果能依吾言語做去決不賺汝珍重示丹陽老人誦毗舍浮佛偈本來一切自在一有身心便不自在矣以有身故隨生隨死以有心故隨憎隨愛隨生則怖死隨死則迷生隨憎則愛亦成憎隨愛則憎亦成愛以故生死無常憎愛百出即一切直下自在翻成一切不自在矣故能達生死不可得者雖處生死而無患能了愛憎不可得者雖當好惡而常閒此意易悟難行果行之積久即一切不自在者直下又翻成一切自在矣欲明此旨須誦毗舍浮佛授道偈千百萬遍無論愚智自然開解示狄都護要拏的是去的耶去的是要拏的耶此兩個子孰賓孰主判然揀辨得出自然諸想頓寂不坐於空到此時節自知好惡矣問人何益示海鹽善人心善蓮花開不善蓮花謝蓮花在自心鮮明不假借即心是佛頭上安頭離心是佛斬頭覓活不即不離若是佛者總成埋沒終不成佛若欲成佛須悟此旨觀身吾嘗諦觀此身兩乂九孔倘裸體通衢之衝吾知無分賢愚少長之人必以為醜而怪之矣再去吾皮膚而觀之吾又知觀者俱怖畏而逃矣吾又去吾筋肉骨立于稠人之中豈惟怖畏而逃之哉必人人膽驚魂喪而不忍觀也噫彼觀者怖畏吾而不返怖己謂之有智可乎佛光僧之有光定慧并強定則情空慧則性彰兩者互奪一存一亡此非口說心悟力行示志燈志乃心之所在燈乃光耿破暗暗破心地自然高明心地既高明則大人君子便不下視汝矣與于中甫浮沉別道情為其纍當斷不斷幽縶奚釋示如聞衆生橫計封蔽本心是故於全體作用中疑而不能用也一夕余將一指屈而問如聞曰汝見麼曰見此外見否曰不知余喟然嗟嘆久之而示之曰我此指一屈一切聖凡一切依正無有一法可伸者豈唯此屈如是法法皆然如一念生滅生則盡虗空界俱生無有芥菜子許空隙可容滅者滅亦如是維摩為彌勒曰一切衆生皆如又文殊對維摩曰居士我不來相而來若初有來今則不能見居士矣由是言之則不來非來來非不來明矣惟諦了自心者情見漸破於此法門通得一法而法法皆了矣勉法興佛言住家比丘見客比丘來心上不喜此我法滅兆也余讀經至此不覺涕泗橫流法興有供衆志書此勉之義井語録平湖西源居士陸基忠述師說多讀書的人終是近真以其被佛祖聖賢言語熏得此心熟了熏得熟了縱習氣不好也漸漸熏得香師說全要講透這個明心見性四字你說心性是一是二某請師開說師說心性原無二衆人不見性所以說百姓日用而不知也至人能自見其性豈非明心乎見性則心自明非是明了心方能見得性也師說志公說坐臥不知原是道只麼忙忙受辛苦師又說道如水水中有魚大幾千里者有魚小如毛髮者大魚以為我大小魚以為我小此情也非理也理則魚無大小皆全是水作如是觀此理也非情也情本無根自性變而有之無我而靈者性也有我而昧者情也衆人率有我而昧者應事所以不能通天下之情聖人率無我而靈者應事所以能通天下之情而吉凶禍福不能纍爾說雖如此名不檢則義不精義不精則理不徹理不徹則性不盡性不盡欲至於命無有是處夫命用也此用現前虗空可以卷舒有無可以為一條佛說有無二法攝盡一切法故至於命者先天而天不違天尚不違萬物能違之哉此等意思口說滑然可聽聞者易生歡喜然要此用現前熱惱根拔不盡清凉夢不曾醒謂之盡性則可謂之至於命則不可古德云不是一番寒徹骨怎得梅花噴鼻香夫寒徹骨者如顏子隳肢體黜聰明亦是個小樣子蓋肢體隳則身不可得聰明黠則心不可得身心既皆不可得則情死而性活矣性活只此肢體便是法身只此聰明便是般若法身則無有邊際般若則智用萬物而不勞若人說法身外有芥菜子許法此便是外道以其心外見法故也又身與心身是積聚義心是知覺義以實言之身即是心心即是身用他積聚便名身用他知覺便名心曹溪曰吾有一物無頭無尾此無頭無尾者見得徹了謂之盡性見徹了能用得謂之命我故曰命用也師飯畢說晉肇法師得罪於姚興興欲殺之肇乞假七日作一書名寶藏論訖將死時說偈曰四大原非有五蘊本來空將頭臨白刃一似斬春風又有一禪者盜入室問有寶否禪曰有盜曰將寶來禪一喝盜斬其首師問此二人誰有受用某曰死不作偈者有受用師問曰如何見得不作偈者有受用某曰不涉廉纖師曰後禪不獨熟養渠亦用得了師說把手牽他入不得惟人自肯乃方親知人者智也自知者明也師說道要知得知得又要行得行得又要證得證得又要忘得忘得方才用得不知道者一遇些小患難即不能做主張便垂首喪氣知道者值此必有解脫之機決不為患難綁縛知又有淺深有誠明而知者有明誠而知者誠明而知得力終大明誠而知得力終弱師說學道先要沒偷心師又說偈曰伏羲畫卦若有成伏羲有死而無生伏羲畫卦若不成伏羲無實而有名惟其成與不成故成成不成虗而靈師問喜怒哀樂未發時有我無我若說無我則成斷滅故未發不是死物但未發不昧已發始謂之中已發不昧未發始謂之和師說易顯道神德行道至微者也德行至粗者也如能通易則至微者我可以顯之至粗者我可以神之易豈可不讀乎不讀易則學問不通方師言唯識界法喻參合理自曉然其經文中道理隨自家活變發揮及鋪敘節奏亦自活變前來所迷生起之由如此伏歸元真亦如此文章馳騁也要活變莫局死格師見某執筆隨問隨說隨抄因謂之曰不必抄說你既在這裏與我相逢只要查考身心有個下落處便了示吳居士佛生七日母即生忉利天及佛出家得道將欲普度衆生既而思之我母未度先度衆生此非後母而先人乎於是即升忉利天為母說法母聞佛說亦心開得道由是而觀則生事死葬之孝以為人子之孝止於此而已恐非天下之達道也以至孝言之而為人子者能如佛為母說法母亦得道如是之孝方為至孝耳故曰以形孝者情也以理孝者性也情乃有我而昧者也性乃無我而靈者也有我則不虗不虗則不靈明無我則虗而靈明矣故以不虗不靈者行孝孝終不達以虗而靈者行孝謂孝不達未之有也今吳居士有志敬事旃檀瑞像必欲母之終將聞法心開得道此亦佛之心也雖然佛為衆生立孝為宗宗立則天下有所主有所主耳目不二耳目不二則心不待別而自一矣心一則有我而昧者日消無我而靈者日長矣一合理相自須菩提至是名微塵衆總七十九字此七十九字千轉萬變低昂浮沉隨問隨答勢如轉萬鈞之石於千仞之溪雖若泰山之重而實輕如鴻毛也泰山之重喻衆生一合相執鴻毛之輕喻聖人般若之利次段自世尊至貪著其事總七十一字此七十一字不過以多碎相破一合相耳前段不過以一合相破多碎相耳何謂多碎相破一合相以多碎相觀一合相則一合相不待觀空而後空也何謂一合相破多碎相以一合相破多碎相亦不待觀空而後空也嗟乎衆生計六尺之軀堅於須彌所以死生榮辱不召而至也如知一合相可以破多碎相多碎相破一合相則一合相與多碎相未嘗有也何須種種方便權巧而力破之雖然身執既重不藉方便孰是天生彌勒自然釋迦破地獄偈若人欲了知三世一切佛應觀法界性一切惟心造此偈總二十字而四聖六凡十法界依正二報靡不括盡矣第世人心識粗浮誦而不知其義義既不知則所謂破地獄破餓鬼破畜生破人破修羅破天破聲聞破緣覺破菩薩破佛一破齊破此佛說偈之意也或曰六凡破之可也四聖何故亦破之耶對曰子不達惟心之旨如一達惟心方知四聖六凡十界法依正二報皆情之變也如六道中三途皆惡情也人修羅天此三者皆善情也聲聞緣覺菩薩佛皆淨情也非染情也由是觀之則天與人修羅雖勝於三塗然皆善染情之變也故曰凡聖情盡體露真常真常即惟心也嗚呼惟心之用聖人與衆人諸佛與衆生皆未嘗不圓滿者也但衆人與衆生日用而不知聖人與諸佛日用而不昧此所以有四聖六凡之別也人為萬物之靈四聖六凡之前者不能知則四聖六凡之變吾不能作主矣既不能作主則被凡聖境界轉我我不能轉凡聖境界也西源居士如達此意則滿偈道人自然形雖木偶心未嘗不通悟也何以故一念不生夫婦無二法身故也又曰天地同根萬物一體故父子夫妻如存者開悟亡者亦心安亡者開悟存者亦心安此道理如此奈世人見迹而不明理所以存亡便作兩橛看也萬曆丙申紫柏尊者挂錫余誡閒堂偶閲普門品至受苦衆生聞是觀世音菩薩一心稱名觀世音菩薩即時觀其音聲皆得解脫乃詰學者云稱名者衆生也而菩薩觀之觀音者菩薩也而衆生解脫是張公喫酒李公醉也如之何其會通耶衆皆未達因舉閬守因緣曰了是則了是矣余因偈曰斬像頭挫射虎石破格物物格兩番墮王宇泰筆麈附禮佛儀式初念淨法界真言三遍訖即曰乘佛威神謹誦淨法界真言若干遍惟願承是真言威神波光力故蕩滌盡虗空遍法界十方三世依正二報悉皆清淨以此清淨三業讚歎三寶觀想三寶禮拜三寶即讚即觀即禮畢即曰南無盡虗空遍法界十方三世一切佛陀達磨僧伽耶各一稱一拜南無千華臺上百寶光中華嚴教主本師釋迦牟尼盧舍那尊佛以下俱一稱一拜南無東方藥師琉璃光如來南無西方極樂世界三十六萬億一十一萬九千五百同名同號大慈大悲阿彌陀佛南無當來下生彌勒尊佛南無藥王藥上菩薩摩訶薩南無觀音勢至菩薩摩訶薩南無文殊師利普賢菩薩摩訶薩南無月光菩薩摩訶薩南無南嶽慧思菩薩摩訶薩南無智琬菩薩摩訶薩南無西天東土歷代傳宗判教併翻傳祕密章句諸祖菩薩摩訶薩等三稱三拜南無南嶽慧海尊者以下一稱一拜南無七祖讓尊者南無青原思尊者南無馬祖一尊者南無石頭遷尊者南無天台智者顗大師南無賢首藏大師南無慈悲基大師南無十方現在人天眼目諸大知識大法師惟願仗佛慈光世世道風遠布尊尊福慧昌隆弟子某仰承釋迦如來慈善根力謹代十方三世一切尊卑檀越水陸空行天龍八部幽冥靈聰人王世主州牧縣長師僧父母法友眷屬願于三寶光中仰仗三寶威神之力未發菩提心者願發菩提心已發菩提心者堅固護法心堅固精進心早出輪回苦次念十願王一遍拜次念般若心經一遍畢曰乘釋迦如來慈善根力謹誦般若心經一遍回向十方常住三寶以此功德囑願當今皇帝萬歲萬萬歲發四弘誓願三稱三拜所謂禮佛一周也紫柏尊者別集附録私淑弟子甬東陸符撰師諱真可達觀其字也晚自號紫柏萬曆中慈聖皇太后欽師道風上亦雅知師謂若此真可名一僧師遂取以更其名云世家吳江之攤缺沈姓父連字季子其先句曲人師生有異徵雄猛不可羈紲稍長志益大飲酒恃氣慕古游俠之行他日自言吾本殺猪屠狗之夫蓋道其實也年十七辭親隻行願立功名塞上行至郡城楓橋天大雨不得前虎丘僧明覺者過視壯其貌問知遠行因以蓋接之歸具晚餐夜臥聞僧誦八十八佛名號心忽開悅侵晨起告覺願出家遂解腰纏治齊覺即白衆為祝髮因禮覺為師是夜即兀坐達旦覺欲募鐵萬斤鑄大鐘師乃獨身往平湖趺坐一巨室門外主人進食不食問何為曰願得鐵萬斤鑄大鐘鎮虎丘山寺主人立𢌿鐵如募師為舉食竟載之歸閉戶讀書歲餘不越閫年二十從講師受具戒掩關武塘景德寺三年辭覺包腰參訪聞僧誦張拙秀才偈至斷除忘想重增病趨向真如亦是邪曰何不云方病無不是邪僧哂之師大疑到處書二語于壁迷悶至頭面俱腫一日齊次忽悟頭面立消曰使我在臨濟德山座下一掌便醒自是氣宇凌鑠諸方矣初祖西來以楞伽印心從上祖家皆精其義立為綱宗勘來學宋洪覺範憂末法失傳遂為智證傳僧寶傳諸書以撰述佛祖旨訣其書世多未見師搜得古本大喜因遊匡山深究相宗精義已而遊五臺至峭壁空巖有老宿孤坐師作禮問一念未生時如何宿竪一指又問既生後如何宿屐兩手師於言下領旨尋跡之失其處至京師參遍融大老融問何來曰從江南來來此何事曰習講又問習講何事曰貫通經旨代佛揚化融曰能清淨說法乎曰至今不染一塵融命師解直裰施旁僧攬其裏曰脫却一層還一層也師笑頷之遂留時與知識嘯巖法主暹理諸公參證所得乃歸省覺去辭覺時已九年師見道法陵遲五家綱宗墜地以負荷大法為己事倡刻大藏廣其流布日以智證傳一書囑付傳習或時教人專持毗舍浮佛偈謂此偈是去來諸佛心印禪之真源常言吾持此二十餘年已熟半句熟兩句死生無慮矣先是有南昌諸生出家補陀曰密藏道開者聞師風來歸師深器重留為侍者凡法門大事如復楞嚴寺刻大藏復化城皆以屬之師終身不受人祈請出世終師世亦無敢開堂受請者獨與憨山清公為友嘗對談四十晝夜不交睫有志修國朝傳燈録與清公約共住曹溪開導法脈遂從帝京繇三晉歷關中跨棧道至蜀禮普賢順流下瞿塘過荊襄登太和至匡廬尋清公約清公以興復勞山海印寺為黃冠奧援訐奏被逮師聞報禱佛冀佑不死獨往曹溪知已得遣雷陽戌因往白下江關待之相見執手嘆曰公以死荷大法我何人哉公不生還吾無生日他日即先公死後事屬公清公至雷陽得間過曹溪曰此達老志也吾以行間至殆不偶後公得釋即住錫宗風振焉上以三殿工開礦稅中使輩出有李道者初奏南康守吳寶秀抗旨逮治其夫人哀憤投繯死師聞之曰良二千石為民請命死其妻自且不免時事至此乎遂入都門營救以毗舍半偈令誦十萬當出獄吳持至八萬上意解得末減師因喟然曰憨山不歸我出世一大負礦稅不止我救世一大負傳燈未續我慧命一大負釋此三負當不復遊王舍城矣門弟子皆知都下側目師相繼奉書勸出開侍者刺血具書隱去師居方山時嘗卜出處于李長者誓以身命弘法報書輒謂吾當斷髮已如斷頭今更有何頭可斷其意以出家兒大事既明身心尚有僇辱揀避雖比古之立名義不侵然諾者尚不可得況欲稱祖家兒孫操提正令以殺活天下雖謗毀章疏不一師處之屹然居無何妖書事發上震怒方大索先是江夏郭公正域為少宗伯以楚藩事與政府抵牾金壇于玉立比部故與郭交好而吳沈令譽與豫皆師弟子以醫游公卿間尤往來江夏稱最善政府私人欲先得沈以及豫與郭而并及師乘妖書羅織捕沈拷掠楚毒備至沈終無所承篋中搜得師與令譽手書乃欲營救清公謂勞山海印之復為聖母保護聖躬香火今毀寺戍清是傷聖母之慈妨皇上之孝也御史康丕揚得之遂據以聞先時慈聖聞師至命近侍陳儒致齊供賜紫伽黎師受供謝紫衣適從石經山得隋時琬禪師所藏佛舍利因請入供太后出帑金送歸石窟言者率以靡內帑金錢為師咎一日有中使奉上命賫數千金請師印藏經頒賜師不奉詔曰印經自有人中使固以受上旨堅請不肯去其人常從師執禮者師呵之欲起杖不得已復命上笑曰固知此僧非利財者上嘗手書金剛經汗漬冊紙疑當易亟遣中貴馳問師以偈進曰御汗之滴萬世津梁無窮法藏從此放光上覽之大悅以故劾上留中政府力持之始下命大金吾研審而已師居西山潭柘寺諸校夜至不敢白但匍匐求開示師為語竟夕至曉諸校伏地哭出帖師命治齊禮佛書偈別衆就訊以三負對無他辭傳送刑部對如初有郎官嫉師者同鞠故令杖師凡對簿直入趺坐階下左右雜投刑具唱聲恐嚇不為動受杖已復起坐獄詞無可按特以救清公書謂語連朝廷欲引子罵父律不果竟擬坐左道獄具將上師聞之曰世法如此久住何為手字付侍者性田令致法侶田哭師叱曰侍我二十年猶作此去就却食飲尋說轉生歌子夜猶口授十餘偈黎明索姜湯嗽齒就地坐誦毗盧遮那佛數聲閉目不語御史曹學程先以言事繫獄聞師狀趨至望見輒大呼師好去師復張目微睇啓手扶兩足跏趺以逝時萬曆癸卯十二月十七日也師生于嘉靖癸卯六月十二日世壽六十有一法臘四十有奇師報逝待命六日坐風露中顏色不少改遺命母龕斂周以蘲埋葬慈慧寺土坎中次年春夏霖雨及秋衆憂淹漬久令田侍者鳴諸當事得請歸龕啓視端然如生見者悲踴如佛復出傳聽來觀奔動畿下龕歸江南途中尚多求啓視瞻禮者江南弟子議卓塔地持未決適圜中録刻成寄至中有怪來雙徑為雙樹語遂定議歸徑山師相好魁奇雄碩威掩萬衆童真絶染膚體如鐵石日飯數升過中不食自出家即脅不到席四十餘年如一日所至設高座懸燈趺對密藏開公嘗侍立聞雞鳴顧語師曰學道人坐地安問雞鳴始行腳二十里足痛以石砥足至日行二百里乃止嘉興楞嚴寺初復禪堂成師題一聯謂當以血書之引錐刺臂血盈碗用絮清大書榜上常至膠西秋水時至欲渡衆不可師解衣先涉亂流及肩疾呼衆前顧謂曰閲生死要當如是師身律嚴至于忠孝大節尤為性篤幼奉母訓不坐閾終身立不敢近常禮佛始進食在潭柘值客至誤先舉乃對知事曰今日有犯戒者命爾痛杖三十輕則倍起授杖就佛前伏地受責如數在陽羡山中讀長沙志至忠臣李芾城守垂陷授劍部將斬其全家部將痛哭受命已而自殺執卷淚迸如雨旁侍者不哭呵之謂當推墮崕下所至梵剎見祝聖牌必敬禮曆書初授必加額始開覽白衣弟子入室激發以忠義懲戒貪暴形于論說至謂教人制舉業進身使為大盜劫財較昔人盡馬入馬腹其罪報當愈甚師心慈外貌威重及門弟子多賢豪搢紳御之平等尊嚴不少假常言法道非資人為牛鼎以世情求法不入吾室我不憾也惟遇利根男子雖劄不少假借當機不契恨之直欲頓斷其命至誘接下中隨器盡量人自習安駑緩畏其攀躋多望崕而退焉明覺者故嘗好醫一日還家畜妻妾以醫名吳會然移居大澤中深自匿師密使人踪跡詭名字稱病臥舟中邀覺覺至大駭師流涕嘆息覺皇恐唯命遂剃除乃反執弟子之禮師行腳見名藍廢址必發願復從楞嚴至歸宗凡興建一十五所歸宗遺蹟僅古松一株寺僧薪斫幾所將盡伐售米五斗有丐者乞米贖免師過而纍土石掎築呪其下願松再榮寺當後復松果日茂寺竟因師復云師聞難無敢為訟冤者唯侍者性田周旋圜中故有枯木冷重雲獨見田侍者之句田常熟人幼常事慧日寺比丘古林貌癯顴起純體筋骨性突兀不易馴擾已林遣事師獨祇侍唯謹頷指使氣息相應即中夜承諾警絶無寐少不知書索卷籍筆劄隨所命必應手師有所往頂笠即行一肩追隨若預裝者嘗呼為小道人或命為田道時遭痛杖初無怨色一日逐之使去田哀號無所出故嘗向大士禮清淨三業文是日聲鳴甚悲音齒忽異師問知為田乃復令入自此不復加杖師示寂報訃江南復北上奉龕歸徑山始剃除不踰年微疾死塔骨寂照庵放生池山左曰田侍者塔云師龕始供庵中越十一年定葬山後黃沙灘人言其地有瀦水改卜五峰大慧塔之陰曰文殊臺巳擇曰火浴矣清公從南嶽數千里來撰文預定祭日適與期會遂把火焉師有文集及圜中語録金沙門人合刻共一十六卷後三十二年有私淑弟子四明陸符刪次補纂為紫柏心要四卷序而藏于家傳略據塔銘為整頓先後蓋以傳說之最真者至大師被患本末當湖季高宗文血骨塔記載之獨詳因採補以入若大師里氏定為吳江季高謂此特因師無巴生傳有生於青草灘語且記沈十林云固曾詢之師曰有益則言無益則止卜之以鬮不果此更誦說大師者不可不知也東廠緝訪妖書底簿萬曆三十一年十一月二十日申時東廠番役李泰等報到僧人達觀由崇文門內觀音寺起身騎坐黑驢一頭帶徒僧二人俗人一名到于北安門外觀音庵住歇五鼓出阜城門去訖十二月初一日辦事李繼祖等訪得達觀在西山檀柘寺潛住西司房辦事吳應斗拏獲錦衣衛候審初二日王之禎令校尉將達觀帶到西司房當廳問說你是箇高僧如何不在深山修行緣何來京城中交結士夫干預公事有達觀回說明公說的是我也欲要遠去今在西山暫住我心中原無別事今既遭遇是我前世業障初三日王之禎問達觀你是那裡人為何造作妖書達觀回說貧僧是蘇州府吳江縣人自幼出家于萬曆元年來京受聖上無量之恩那有此事蒼蒼在上若有一字即該萬死之禎問康御史搜出你與沈令譽書立心要遠而大書內怎麼說達觀回說因為德清與耿一蘭爭海印寺造下業障貧僧將此書與沈令譽託牌子官閻鸞未曾舉行之禎問你書內如何將穆宗皇帝稱夫你雖方外人亦是朝廷臣子這是你不省事處達觀回說貧僧止以五倫內所據寫之只是教人學好並不敢有一字為非之禎說恃著你有學問造作妖書你不肯實招令校尉將手扭開了將手指拶一拶敲一百下達觀回說這樣事情不是貧僧做的之禎又問你為僧只合居山谷修行是你本等你來京所幹何事達觀回說貧僧因化藏經并修高僧傳續傳燈録因此來京暫住又沈令譽供係吳江縣人先年在籍投拜被參問絞監故僧人達觀為師萬曆三十年六月以行醫來京比達觀先已在京朝夕相往計議救拔德清張本及糾結月清戒山等謀進佛牙云云右東廠緝訪妖書底簿故司理陳矩家所藏一時拷掠詰問與大師從容應對不激不撓其實録備見于此可與圜中語録相證明也奸邪小人快心鈎黨欲借大師為一網斬艾賢士大夫之異己者遂不憚殺阿羅漢造彌天積劫之業江夏郭文毅公正域撰妖書始末特書其事國史僧史胥有徵焉載筆者宜詳考之以補塔銘之闕石渠舊史謙益謹識送達觀大師序昔人云佛法難值善知識難遇蓋兩重之余謂不然即值佛法矣不遇善知識道眼終不開通譬如生育人不見日月豈日月咎一旦有大醫王抉其障醫而還之明此豈尋常欣幸哉余將三十歲始知有佛法又數年始遇達觀師于嘉善之風涇此時習天台教師略施鈎錐余本然無自蓋猶勿遇也又數年遭先人之變居憂里中時營復楞嚴師暫憩東靜室余屢過焉師密以緣生無性之旨方便開示余覺有悟如風痺人始識痛癢矣逾年師將雲水贈余白衲并白衲歌俗以凡質蒙師曲誘慶與愧俱自乙酉別師庚寅再晤金壇辛卯仲夏再晤姑蘇至今日之晤凡三蓋屈指十年所余道業不加進負師實多乃師道眼益明操履益氷潔而功益精且勤蓋脅未嘗至席也師謂豫君輩無慚愧坐無勝解有勝解則生慚愧自然照齊到因扣壇經佛性諸法常無常義詰余余目過了然一再銷文頓覺語澀蓋真無自性故能起妄妄無自性故能會真衆生二乘所共迷執不繇聖經莫暢玄旨是日再晤靜海師再三逼桚遂通斯義有如撥霧益悟向來依教隨文取便口誦其乖佛意多矣師比精周易絶喜東坡傳義謂余曰吾向淺視儒書今觀周孔之言對鏡見面未有違佛者違佛者注腳耳為余剖析性情魂魄之旨明快直截令人喜躍彼鑽故紙者真足愧死嗟乎如此人奈何可一日不親近承事哉今師且行矣師心如空身如雲如影行如金玉以慈悲為牀座以山河大地為園囿瓶錫所到天龍執侍諸佛授手大根大器在在合集如水投水波波無盡何有於余之蒙又何有于蒙者之言所喋喋者以勗夫遇師者生難遭想耳是為序萬曆甲午五月十又三日真實居士憑夢禎和南書于南翰林之公署華亭董其昌曰達觀禪師初至雲間余時為諸生與會于積慶方丈越三日觀師過訪稽首請余為思大禪師大乘正觀序曰王廷尉妙于文章陸宗伯深於禪理合之雙美離之兩傷道人于子有厚望耳余自此始沉酣內典參究宗乘後得密藏禪師激揚稍有所契後觀師留長安余以書招之曰馬上君子無佛性不如東南雲水接引初機利根紹隆大法自是不復相聞癸卯冬大獄波及觀師搜其書此書不知何在余謂此足以報觀師矣昔人以三轉語報法乳恩有以也又曰觀師答問常有不經人道語余曾問菩薩處胎受生之後還知前生為誰如所云宿命通否師曰聖人無我但受生之後前生所作循業發現宛然如一日安用自知為張三李四許多我相又余時方應舉日用攻舉子業余問此於學道寧不相妨否師曰譬如好色人患思憶病此人二六時中寧廢著衣吃飯一切酬應否雖復著衣吃飯一切酬應其思憶病相續不斷即作意斷之其病益深李太白詩曰抽刀斷水水更流是也有患煩惱塵緣能障道者若為掃除師曰如一男子有殺父讐懷憤欲報拂拭純鈎畢生尋覓初聞張三二十年後知此真讐本是李四便舍張三直覓李四諸人欲掃除煩惱正為未知真讐也此語與張拙斷除煩惱重增病更覺透徹今紫柏老人集乃不見載知法語所遺多矣跋紫柏尊者全集昔人嘆中峰輟席不知道隱何方以豫耳目所及如達觀可大師真末法中龍象也讀其書想見其志氣雄爽為人真切最可敬者不以釋迦壓孔老不以內典廢子史于佛法中不以宗壓教不以性廢相不以賢首廢天台蓋其見地融朗圓攝萬法故橫口所說無罣礙無偏黨與偎墻倚壁隨人妍𡟎者大不侔矣其于石門文字禪東坡禪喜集稱之不去口蓋此方真教體清淨在音聞欲以文字般若作觀照實相之階梯不妨高擡慧業誘掖利根則又此老之深心密意也常熟顧大韶仲恭謹識憶萬曆庚申歲達老之徒淡居鎧公持紫柏集見示豫為校定二十卷鎧公携往廬山今其本存亡不可知然料難再覩矣此金壇于氏所刻不知誰所刪定較豫所定本似有遺漏聊記所憶一二條于後與某人書云宗門問答如蠻人說蠻語蠻人當自解之此語頗有味又一傳記大盜某為僧殺倡斷愛習靜得果始末甚奇又有一則盛稱本朝高僧琦楚石又與馬御史經綸論李卓五往復書俱可傳今本皆無之顧大韶又識紫柏老人集鈔序紫柏老人示現嘉靖度生萬曆方余駒齒甫落則已厭人間世還兜率內院矣余既深自痛恨不獲親叩籌室然猶幸從山中禪衲憨公塔銘洞悉老人行履大都直捷似黃檗通悟似臨濟雄猛剛烈似天目高峰至於繇相歸性即緣生以指點無生殆卓卓乎彼土天親所不能踰我震旦中相宗諸師所不能窺其閫奧也嗟夫入此門庭誰不具決定志發弘大願乃一朝布袋打失桶底篐脫或以嗔或以喜或以辨才樂說或以佛事莊嚴亦若各聽其機緣之所遭各隨其天性之所近蓋從來未有學步邯鄲抵掌叔敖麈尾雷同而可以上傳祖燈者也昔有譏陳元龍驕而自矜者應之曰一門雍穆有德有行吾敬陳元方兄弟淵清玉潔有禮有法吾敬華子魚清修嫉惡有識有義吾敬趙元達博聞強記奇逸卓斝吾敬孔文舉雄姿傑出有王霸之姿吾敬劉玄德所敬如此何驕之有嗟夫此可以定老人矣全集卷帙浩繁且多重復茲特摘其最要者以為老人文字三昧崇禎甲戌蒲月甬東錢啓忠沃心甫題于潯陽之長松館中紫柏老人別集附録卷終紫柏尊者別集跋尊者示現于嘉靖中垂教于萬曆中母后為之優賫天子為之褒嘉自公卿以逮編氓禮足而受記者惟恐後虞山所稱挺生東吳氣宇如王者良不誣已夫摩騰致隆于漢帝康會見重于吳君曇始登魏朝之座道林踞晉主之床以觀尊者何多讓焉昔大雄氏說法隨緣開示即一言半偈四大衆諦聽如童稚得蜜孝子依親尊者擁大法幢分身散影普天利益不啻以三十二應身入諸國土舒八萬四千臂接引衆生于本集之外復有別集迷者藉之為寶筏覺者賴之為金繩余合十而莊誦之但知無上妙諦嘆為希有金貝浮香梵花四照雖古德之活句五家之機鋒蔑以加矣因念龍藏之所自始西方聖人以一大事因緣出現于世從鹿野苑中至跋提河倡演大經無我無量無小無巨或利或鈍或頓或漸盡皆攝入薩婆若海既滅度後弟子阿難陀優婆離等各以大智慧結集為修多羅藏共闡化源尊者為末法中龍象導揚西方聖人之旨闡化源以為佛法金湯者厥功不亦偉與余曾王父孝廉公親承摩頂王父長史公先君贈司理公世為歸依余之誦法尊者遺言非敢曰報佛恩僅以延先澤云耳康熙八年仲冬丹陽奉佛弟子賀寬盥手謹跋
